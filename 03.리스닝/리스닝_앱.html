    /* ══════════════════════════════════════════
       STATE
    ══════════════════════════════════════════ */
    const STORE_KEY = 'listen_v2';
    let state = { currentSessionId: null, answers: {}, submitted: {}, dark: false, speed: 1 };

    function loadState() {
      try { const s = JSON.parse(localStorage.getItem(STORE_KEY)); if (s) Object.assign(state, s); } catch (e) { }
    }
    function saveState() {
      try { localStorage.setItem(STORE_KEY, JSON.stringify(state)); } catch (e) { }
    }
    function getSessionAnswers(sid) {
      if (!state.answers[sid]) state.answers[sid] = {};
      return state.answers[sid];
    }

    /* ══════════════════════════════════════════
       DARK MODE
    ══════════════════════════════════════════ */
    function applyDark() {
      document.body.classList.toggle('dark', !!state.dark);
      document.getElementById('dark-icon').className = state.dark ? 'ri-sun-line' : 'ri-moon-line';
    }
    function toggleDark() { state.dark = !state.dark; applyDark(); saveState(); }

    /* ══════════════════════════════════════════
       NAVIGATION
    ══════════════════════════════════════════ */
    function showPage(id) {
      document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
      document.getElementById('page-' + id).classList.add('active');
      const nav = document.getElementById('app-nav');
      if (nav) nav.style.display = (id === 'home') ? '' : 'none';
    }
    function goHome() {
      pauseAudio();
      state.currentSessionId = null;
      showPage('home');
      renderHome();
    }

    /* ══════════════════════════════════════════
       HOME
    ══════════════════════════════════════════ */
    function renderHome() {
      const list = document.getElementById('session-list');
      list.innerHTML = '';
      SESSIONS.forEach(s => {
        const ans = getSessionAnswers(s.id);
        const answeredCount = Object.keys(ans).length;
        let cCount = 0;
        s.questions.forEach(q => { if (ans[q.num] === q.answer) cCount++; });
        const pct = s.questions.length > 0 ? Math.round(answeredCount / s.questions.length * 100) : 0;
        const card = document.createElement('div');
        card.className = 'session-card';
        card.innerHTML = `
      <div class="session-card-header">
        <div>
          <div class="session-card-title">${s.title}</div>
          <div class="session-card-subtitle">${s.subtitle}</div>
        </div>
        <div class="session-card-date">${s.date}</div>
      </div>
      <div class="session-card-footer">
        <div class="session-prog-bar"><div class="session-prog-fill" style="width:${pct}%"></div></div>
        <div class="session-prog-label">${answeredCount > 0 ? cCount + '/' + s.questions.length + ' 정답' : '미시작'}</div>
        <button class="session-start-btn" onclick="openSession('${s.id}');event.stopPropagation()" style="${state.submitted[s.id] ? 'background:var(--success)' : ''}">
          <i class="${state.submitted[s.id] ? 'ri-bar-chart-line' : 'ri-play-large-fill'}"></i>${state.submitted[s.id] ? '결과 보기' : answeredCount > 0 ? '계속하기' : '시작'}
        </button>
      </div>`;
        card.addEventListener('click', () => openSession(s.id));
        list.appendChild(card);
      });
    }

    /* ══════════════════════════════════════════
       SESSION OPEN
    ══════════════════════════════════════════ */
    function openSession(sid) {
      const session = SESSIONS.find(s => s.id === sid);
      if (!session) return;
      state.currentSessionId = sid;
      saveState();

      if (state.submitted[sid]) {
        renderResult(session);
        return;
      }

      document.getElementById('session-title-text').textContent = session.title;
      document.getElementById('session-subtitle-text').textContent = session.subtitle;
      document.getElementById('score-total').textContent = session.questions.length;

      showPage('session');
      initAudioPlayer(session);
      renderSession(session);
      updateScore(session);
    }

    /* ══════════════════════════════════════════
       AUDIO PLAYER
    ══════════════════════════════════════════ */
    const audio = document.getElementById('main-audio');
    let audioReady = false;

    function initAudioPlayer(session) {
      audioReady = false;
      audio.src = '';
      document.getElementById('player-ui').classList.remove('ready');
      document.getElementById('player-error').style.display = 'none';
      document.getElementById('play-icon').className = 'ri-play-large-fill';
      document.getElementById('seek-fill').style.width = '0';
      document.getElementById('seek-thumb').style.left = '0';
      document.getElementById('seek-input').value = 0;
      document.getElementById('time-cur').textContent = '0:00';
      document.getElementById('time-dur').textContent = '0:00';

      // Set speed from state
      audio.playbackRate = state.speed || 1;
      document.querySelectorAll('.speed-btn').forEach(btn => {
        const sp = parseFloat(btn.dataset.speed);
        btn.classList.toggle('active', sp === (state.speed || 1));
      });

      // Load audio
      audio.src = session.audioFile;
      audio.load();

      audio.oncanplaythrough = () => {
        audioReady = true;
        document.getElementById('player-ui').classList.add('ready');
        document.getElementById('player-error').style.display = 'none';
        document.getElementById('time-dur').textContent = fmtTime(audio.duration);
      };
      audio.onerror = () => {
        document.getElementById('player-ui').classList.remove('ready');
        document.getElementById('player-error').style.display = 'block';
        const cmd = `yt-dlp -x --audio-format m4a \\\n  -o "audio/${session.id}.m4a" \\\n  "${session.youtubeUrl}"`;
        document.getElementById('error-cmd').textContent = cmd;
      };
      audio.ontimeupdate = updateSeekBar;
      audio.onended = () => {
        document.getElementById('play-icon').className = 'ri-play-large-fill';
      };
      audio.onplay = () => {
        document.getElementById('play-icon').className = 'ri-pause-large-fill';
      };
      audio.onpause = () => {
        document.getElementById('play-icon').className = 'ri-play-large-fill';
      };
    }

    function togglePlay() {
      if (!audioReady) return;
      audio.paused ? audio.play() : audio.pause();
    }
    function pauseAudio() {
      if (!audio.paused) audio.pause();
    }
    function skipTime(sec) {
      if (!audioReady) return;
      audio.currentTime = Math.max(0, Math.min(audio.duration, audio.currentTime + sec));
    }
    function setSpeed(sp) {
      state.speed = sp;
      audio.playbackRate = sp;
      saveState();
      document.querySelectorAll('.speed-btn').forEach(btn => {
        btn.classList.toggle('active', parseFloat(btn.dataset.speed) === sp);
      });
    }
    function updateSeekBar() {
      if (!audio.duration) return;
      const pct = audio.currentTime / audio.duration;
      const pctStr = (pct * 100).toFixed(2) + '%';
      document.getElementById('seek-fill').style.width = pctStr;
      document.getElementById('seek-thumb').style.left = pctStr;
      document.getElementById('seek-input').value = Math.round(pct * 1000);
      document.getElementById('time-cur').textContent = fmtTime(audio.currentTime);
    }
    function fmtTime(s) {
      if (!isFinite(s)) return '0:00';
      const m = Math.floor(s / 60), sec = Math.floor(s % 60);
      return m + ':' + String(sec).padStart(2, '0');
    }

    // Seek input
    document.getElementById('seek-input').addEventListener('input', function () {
      if (!audioReady) return;
      const pct = parseInt(this.value) / 1000;
      audio.currentTime = pct * audio.duration;
    });

    // Speed buttons (event delegation)
    document.getElementById('speed-selector').addEventListener('click', function (e) {
      const btn = e.target.closest('.speed-btn');
      if (!btn) return;
      setSpeed(parseFloat(btn.dataset.speed));
    });

    // Keyboard: space = play/pause
    document.addEventListener('keydown', function (e) {
      if (e.code === 'Space' && document.getElementById('page-session').classList.contains('active')) {
        const tag = document.activeElement.tagName;
        if (tag !== 'INPUT' && tag !== 'BUTTON') {
          e.preventDefault();
          togglePlay();
        }
      }
    });

    /* ══════════════════════════════════════════
       SESSION RENDER
    ══════════════════════════════════════════ */
    function renderSession(session) {
      renderQGrid(session);
      renderQuestions(session);
    }
    function renderQGrid(session) {
      const grid = document.getElementById('q-grid');
      grid.innerHTML = '';
      const ans = getSessionAnswers(session.id);
      session.questions.forEach(q => {
        const selected = ans[q.num];
        const btn = document.createElement('button');
        btn.className = 'q-grid-btn';
        btn.id = 'qgrid-' + q.num;
        btn.textContent = q.num;
        if (selected !== undefined) btn.classList.add('answered');
        btn.addEventListener('click', () => document.getElementById('qcard-' + q.num).scrollIntoView({ behavior: 'smooth', block: 'start' }));
        grid.appendChild(btn);
      });
    }
    function renderQuestions(session) {
      const list = document.getElementById('questions-list');
      list.innerHTML = '';
      const ans = getSessionAnswers(session.id);
      session.questions.forEach(q => list.appendChild(buildQCard(q, ans[q.num], session.id)));
    }

    /* ══════════════════════════════════════════
       QUESTION CARD
    ══════════════════════════════════════════ */
    const TYPE_LABELS = { image: '그림 선택', text: '5지선다', table: '표 일치', dialogue: '대화 완성', dictation: '받아쓰기' };
    const NUM_LABELS = ['①', '②', '③', '④', '⑤'];

    function buildQCard(q, selected, sessionId) {
      // EXAM MODE: no feedback, no correct/wrong colors, no script
      const answered = selected !== undefined;
      const card = document.createElement('div');
      card.className = 'q-card'; card.id = 'qcard-' + q.num;

      // Head
      const head = document.createElement('div'); head.className = 'q-card-head';
      const badge = document.createElement('div');
      badge.className = 'q-num-badge' + (answered ? ' answered-badge' : '');
      badge.textContent = q.num;
      const typeBadge = document.createElement('div'); typeBadge.className = 'q-type-badge';
      typeBadge.textContent = TYPE_LABELS[q.type] || q.type;
      head.appendChild(badge); head.appendChild(typeBadge);
      if (answered) {
        const dot = document.createElement('div'); dot.style.cssText = 'margin-left:auto;font-size:18px;color:var(--primary);';
        dot.innerHTML = '<i class="ri-check-line"></i>';
        head.appendChild(dot);
      }
      card.appendChild(head);

      // Body
      const body = document.createElement('div'); body.className = 'q-card-body';
      const qText = document.createElement('div'); qText.className = 'q-text'; qText.textContent = q.q;
      body.appendChild(qText);

      if (q.type === 'image') body.appendChild(buildImageOptions(q, selected, sessionId));
      else if (q.type === 'table') { body.appendChild(buildTableContent(q)); body.appendChild(buildTableOptions(q, selected, sessionId)); }
      else if (q.type === 'dialogue') { if (q.dialogueLines) body.appendChild(buildDialogueContext(q)); body.appendChild(buildTextOptions(q, selected, sessionId)); }
      else body.appendChild(buildTextOptions(q, selected, sessionId));

      card.appendChild(body);
      return card;
    }

    function buildImageOptions(q, selected, sessionId) {
      // EXAM MODE: only show which option was selected (neutral blue)
      const wrap = document.createElement('div');
      const row = document.createElement('div'); row.className = 'img-opts-row';
      const answered = selected !== undefined;

      q.options.forEach((imgSrc, i) => {
        const idx = i + 1;
        const btn = document.createElement('button'); btn.className = 'img-opt-btn'; btn.disabled = answered;

        const img = document.createElement('img');
        img.src = imgSrc; img.alt = NUM_LABELS[i]; img.loading = 'lazy';
        btn.appendChild(img);

        const num = document.createElement('span'); num.className = 'opt-num';
        num.textContent = NUM_LABELS[i];
        btn.appendChild(num);

        if (answered && idx === selected) btn.classList.add('exam-selected');

        if (!answered) btn.addEventListener('click', () => selectAnswer(sessionId, q.num, idx));
        row.appendChild(btn);
      });
      wrap.appendChild(row); return wrap;
    }

    function buildTextOptions(q, selected, sessionId) {
      // EXAM MODE: only show which option was selected (neutral blue)
      const wrap = document.createElement('div'); wrap.className = 'text-opts';
      const answered = selected !== undefined;
      q.options.forEach((opt, i) => {
        const idx = i + 1;
        const btn = document.createElement('button'); btn.className = 'text-opt-btn'; btn.disabled = answered;
        if (answered && idx === selected) btn.classList.add('exam-selected');
        btn.innerHTML = `<span class="opt-label">${NUM_LABELS[i]}</span><span class="opt-text">${escHtml(opt)}</span>`;
        if (!answered) btn.addEventListener('click', () => selectAnswer(sessionId, q.num, idx));
        wrap.appendChild(btn);
      });
      return wrap;
    }

    function buildTableContent(q) {
      const wrap = document.createElement('div');
      const title = document.createElement('div');
      title.style.cssText = 'font-size:14px;font-weight:700;color:var(--fg);margin-bottom:6px;';
      title.textContent = q.tableTitle; wrap.appendChild(title);
      const table = document.createElement('table'); table.className = 'q-table';
      q.tableData.forEach(row => {
        const tr = document.createElement('tr');
        tr.innerHTML = `<td class="row-label">${row.label}</td><td>${escHtml(row.key)}</td><td>${escHtml(row.value)}</td>`;
        table.appendChild(tr);
      });
      wrap.appendChild(table); return wrap;
    }

    function buildTableOptions(q, selected, sessionId) {
      // EXAM MODE: only show which option was selected (neutral blue)
      const answered = selected !== undefined;
      const wrap = document.createElement('div'); wrap.className = 'text-opts';
      q.tableData.forEach((row, i) => {
        const idx = i + 1;
        const btn = document.createElement('button'); btn.className = 'text-opt-btn'; btn.disabled = answered;
        if (answered && idx === selected) btn.classList.add('exam-selected');
        btn.innerHTML = `<span class="opt-label">${row.label}</span><span class="opt-text">${escHtml(row.key + (row.value ? ' — ' + row.value : ''))}</span>`;
        if (!answered) btn.addEventListener('click', () => selectAnswer(sessionId, q.num, idx));
        wrap.appendChild(btn);
      });
      return wrap;
    }

    function buildDialogueContext(q) {
      const box = document.createElement('div'); box.className = 'dialogue-context';
      if (q.dialogueLines) {
        // 구조화된 포맷 (2025_m1_r1)
        q.dialogueLines.forEach(line => {
          const div = document.createElement('div'); div.className = 'dialogue-line';
          if (line.blank) div.innerHTML = `<strong>${line.spk}:</strong> <span class="dialogue-blank">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;</span>`;
          else div.innerHTML = `<strong>${line.spk}:</strong> ${escHtml(line.text)}`;
          box.appendChild(div);
        });
      } else {
        // 일반 포맷: q.q(첫 줄) + q.script(나머지)
        const scriptLines = (q.script || '').split('\n').filter(l => l.trim() && !l.startsWith('ANN:'));
        const allLines = [q.q, ...scriptLines];
        allLines.forEach(line => {
          const div = document.createElement('div'); div.className = 'dialogue-line';
          if (/_{4,}/.test(line)) {
            const before = line.replace(/_{4,}.*$/, '').trim();
            div.innerHTML = (before ? escHtml(before) + ' ' : '') + '<span class="dialogue-blank">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;</span>';
          } else {
            div.textContent = line;
          }
          box.appendChild(div);
        });
      }
      return box;
    }

    /* ══════════════════════════════════════════
       ANSWER
    ══════════════════════════════════════════ */
    function selectAnswer(sessionId, qNum, selectedIdx) {
      const session = SESSIONS.find(s => s.id === sessionId);
      if (!session) return;
      const q = session.questions.find(q => q.num === qNum);
      if (!q) return;
      const ans = getSessionAnswers(sessionId);
      if (ans[qNum] !== undefined) return;
      ans[qNum] = selectedIdx; saveState();
      const oldCard = document.getElementById('qcard-' + qNum);
      oldCard.replaceWith(buildQCard(q, selectedIdx, sessionId));
      const gridBtn = document.getElementById('qgrid-' + qNum);
      if (gridBtn) gridBtn.className = 'q-grid-btn answered';
      updateScore(session);
    }

    function updateScore(session) {
      const ans = getSessionAnswers(session.id);
      let answered = 0;
      session.questions.forEach(q => { if (ans[q.num] !== undefined) answered++; });
      const total = session.questions.length;
      const el = document.getElementById('score-answered-count');
      if (el) el.textContent = answered;
      document.getElementById('score-answered').textContent = answered + '/' + total + ' 완료';
      document.getElementById('score-fill').style.width = (total > 0 ? Math.round(answered / total * 100) : 0) + '%';
    }

    /* ══════════════════════════════════════════
       SCRIPT TOGGLE
    ══════════════════════════════════════════ */
    function toggleScript(qNum) {
      const block = document.getElementById('script-block-' + qNum);
      const btn = document.getElementById('script-btn-' + qNum);
      const open = block.classList.toggle('open');
      btn.innerHTML = open ? '<i class="ri-file-text-fill"></i>대본 숨기기' : '<i class="ri-file-text-line"></i>대본 보기';
    }

    /* ══════════════════════════════════════════
       RESET
    ══════════════════════════════════════════ */
    function confirmReset() {
      if (!confirm('이 회차의 모든 답변을 초기화할까요?')) return;
      const sid = state.currentSessionId;
      if (!sid) return;
      state.answers[sid] = {};
      delete state.submitted[sid];
      saveState();
      const session = SESSIONS.find(s => s.id === sid);
      if (session) {
        document.getElementById('session-title-text').textContent = session.title;
        document.getElementById('session-subtitle-text').textContent = session.subtitle;
        document.getElementById('score-total').textContent = session.questions.length;
        showPage('session');
        initAudioPlayer(session);
        renderSession(session);
        updateScore(session);
      }
    }

    /* ══════════════════════════════════════════
       SUBMIT → RESULT
    ══════════════════════════════════════════ */
    function submitSession() {
      const sid = state.currentSessionId;
      const session = SESSIONS.find(s => s.id === sid);
      if (!session) return;
      const ans = getSessionAnswers(sid);
      const answered = Object.keys(ans).length;
      if (answered < session.questions.length) {
        const remaining = session.questions.length - answered;
        if (!confirm(`아직 ${remaining}문제가 남아 있습니다. 완료 처리할까요?`)) return;
      }
      pauseAudio();
      state.submitted[sid] = true;
      state.doneDate = new Date().toISOString().slice(0, 10);
      saveState();
      renderResult(session);
    }

    function retrySession() {
      const sid = state.currentSessionId;
      if (!sid) return;
      if (!confirm('모든 답변을 초기화하고 다시 풀까요?')) return;
      state.answers[sid] = {};
      delete state.submitted[sid];
      saveState();
      const session = SESSIONS.find(s => s.id === sid);
      if (session) {
        document.getElementById('session-title-text').textContent = session.title;
        document.getElementById('session-subtitle-text').textContent = session.subtitle;
        document.getElementById('score-total').textContent = session.questions.length;
        showPage('session');
        initAudioPlayer(session);
        renderSession(session);
        updateScore(session);
      }
    }

    function renderResult(session) {
      state.currentSessionId = session.id;
      document.getElementById('result-title').textContent = session.title;
      document.getElementById('result-sub').textContent = session.subtitle;

      // Score
      const ans = getSessionAnswers(session.id);
      let correct = 0;
      session.questions.forEach(q => { if (ans[q.num] === q.answer) correct++; });
      const total = session.questions.length;
      const pct = total > 0 ? Math.round(correct / total * 100) : 0;

      document.getElementById('result-score-num').textContent = correct;
      document.getElementById('result-score-denom').textContent = '/' + total;
      document.getElementById('result-score-pct').textContent = pct + '% 정답';
      document.getElementById('result-progress-fill').style.width = pct + '%';

      // Question cards
      const list = document.getElementById('result-questions-list');
      list.innerHTML = '';
      session.questions.forEach(q => list.appendChild(buildResultQCard(q, ans[q.num])));

      showPage('result');
      window.scrollTo(0, 0);
    }

    function buildResultQCard(q, selected) {
      const answered = selected !== undefined;
      const isCorrect = answered && selected === q.answer;
      const card = document.createElement('div'); card.className = 'result-q-card';

      // Head
      const head = document.createElement('div'); head.className = 'result-q-head';
      const badge = document.createElement('div');
      badge.className = 'q-num-badge' + (answered ? (isCorrect ? ' correct' : ' wrong') : '');
      badge.textContent = q.num;
      const typeBadge = document.createElement('div'); typeBadge.className = 'q-type-badge';
      typeBadge.textContent = TYPE_LABELS[q.type] || q.type;
      const statusIcon = document.createElement('div'); statusIcon.style.cssText = 'margin-left:auto;font-size:18px;';
      if (answered) {
        statusIcon.innerHTML = isCorrect
          ? '<i class="ri-checkbox-circle-fill" style="color:var(--success)"></i>'
          : '<i class="ri-close-circle-fill" style="color:var(--fail)"></i>';
      } else {
        statusIcon.innerHTML = '<i class="ri-minus-circle-line" style="color:var(--hint)"></i>';
      }
      head.appendChild(badge); head.appendChild(typeBadge); head.appendChild(statusIcon);
      card.appendChild(head);

      // Body
      const body = document.createElement('div'); body.className = 'result-q-body';
      const qText = document.createElement('div'); qText.className = 'q-text'; qText.textContent = q.q;
      body.appendChild(qText);

      // Options with feedback
      if (q.type === 'image') body.appendChild(buildResultImageOptions(q, selected));
      else if (q.type === 'table') { body.appendChild(buildTableContent(q)); body.appendChild(buildResultTextOptions(q, selected, true)); }
      else if (q.type === 'dialogue') { body.appendChild(buildDialogueContext(q)); body.appendChild(buildResultTextOptions(q, selected, false)); }
      else body.appendChild(buildResultTextOptions(q, selected, false));

      // Feedback bar
      if (answered) {
        const fb = document.createElement('div');
        fb.className = 'feedback-bar ' + (isCorrect ? 'correct' : 'wrong');
        fb.innerHTML = isCorrect
          ? '<i class="ri-checkbox-circle-fill"></i><span>정답입니다!</span>'
          : `<i class="ri-close-circle-fill"></i><span>오답 — 정답은 <strong>${NUM_LABELS[q.answer - 1]}</strong>입니다.</span>`;
        body.appendChild(fb);
      } else {
        const fb = document.createElement('div');
        fb.className = 'feedback-bar wrong';
        fb.innerHTML = `<i class="ri-question-line"></i><span>미응답 — 정답은 <strong>${NUM_LABELS[q.answer - 1]}</strong>입니다.</span>`;
        body.appendChild(fb);
      }

      // Script (always visible in result)
      const scriptBlock = document.createElement('div'); scriptBlock.className = 'result-script';
      scriptBlock.innerHTML = `<div class="result-script-title">Script</div><div class="result-script-text">${escHtml(q.script || '')}</div>`;
      body.appendChild(scriptBlock);

      card.appendChild(body);
      return card;
    }

    function buildResultImageOptions(q, selected) {
      const wrap = document.createElement('div');
      const row = document.createElement('div'); row.className = 'img-opts-row';
      q.options.forEach((imgSrc, i) => {
        const idx = i + 1;
        const btn = document.createElement('button'); btn.className = 'img-opt-btn'; btn.disabled = true;
        const img = document.createElement('img'); img.src = imgSrc; img.alt = NUM_LABELS[i]; img.loading = 'lazy';
        btn.appendChild(img);
        const num = document.createElement('span'); num.className = 'opt-num'; num.textContent = NUM_LABELS[i];
        btn.appendChild(num);
        const fbIcon = document.createElement('i'); fbIcon.className = 'img-fb-icon';
        if (selected !== undefined) {
          if (idx === q.answer && idx === selected) { btn.classList.add('selected-correct'); fbIcon.className = 'img-fb-icon ri-checkbox-circle-fill'; }
          else if (idx === q.answer) { btn.classList.add('correct-answer'); fbIcon.className = 'img-fb-icon ri-checkbox-circle-fill'; }
          else if (idx === selected) { btn.classList.add('selected-wrong'); fbIcon.className = 'img-fb-icon ri-close-circle-fill'; }
        } else {
          if (idx === q.answer) { btn.classList.add('correct-answer'); fbIcon.className = 'img-fb-icon ri-checkbox-circle-fill'; }
        }
        btn.appendChild(fbIcon);
        row.appendChild(btn);
      });
      wrap.appendChild(row); return wrap;
    }

    function buildResultTextOptions(q, selected, isTable) {
      const wrap = document.createElement('div'); wrap.className = 'text-opts';
      const opts = isTable ? q.tableData : q.options;
      opts.forEach((opt, i) => {
        const idx = i + 1;
        const btn = document.createElement('button'); btn.className = 'text-opt-btn'; btn.disabled = true;
        if (selected !== undefined) {
          if (idx === q.answer && idx === selected) btn.classList.add('selected-correct');
          else if (idx === q.answer) btn.classList.add('correct-answer');
          else if (idx === selected) btn.classList.add('selected-wrong');
        } else {
          if (idx === q.answer) btn.classList.add('correct-answer');
        }
        const label = isTable ? opt.label : NUM_LABELS[i];
        const text = isTable ? escHtml(opt.key + (opt.value ? ' — ' + opt.value : '')) : escHtml(opt);
        btn.innerHTML = `<span class="opt-label">${label}</span><span class="opt-text">${text}</span>`;
        wrap.appendChild(btn);
      });
      return wrap;
    }

    /* ══════════════════════════════════════════
       UTIL
    ══════════════════════════════════════════ */
    function escHtml(str) {
      return String(str).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
    }

    /* ══════════════════════════════════════════
       INIT
    ══════════════════════════════════════════ */
    loadState();
    applyDark();
    renderHome();
  </script>
</body>

</html>
