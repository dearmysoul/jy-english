<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>영어듣기 연습</title>
  <link href="https://cdn.jsdelivr.net/npm/remixicon/fonts/remixicon.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/pretendard@latest/dist/web/static/pretendard.css" rel="stylesheet">
  <style>
    :root {
      --bg: #F1EFE8;
      --surface: #E8E6DF;
      --card: #FFFFFF;
      --border: #D3D1C7;
      --fg: #2C2C2A;
      --muted-fg: #5F5E5A;
      --hint: #888780;
      --primary: #378ADD;
      --primary-dark: #185FA5;
      --primary-bg: #E6F1FB;
      --success: #639922;
      --success-bg: #EAF3DE;
      --success-dark: #27500A;
      --fail: #E24B4A;
      --fail-bg: #FCEBEB;
      --fail-dark: #791F1F;
      --cta: #BA7517;
      --cta-bg: #FAEEDA;
      --font: 'Pretendard', -apple-system, 'Apple SD Gothic Neo', sans-serif;
      --radius: 4px;
      --nav-h: 52px;
    }

    body.dark {
      --bg: #1C1C1A;
      --surface: #252523;
      --card: #2C2C2A;
      --border: #3A3A37;
      --fg: #EDECEA;
      --muted-fg: #A8A69F;
      --hint: #6E6D67;
      --primary-bg: #1A2D42;
      --success-bg: #1A2E0A;
      --fail-bg: #2E1111;
      --cta-bg: #2E1F06;
    }

    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html,
    body {
      height: 100%;
    }

    body {
      font-family: var(--font);
      background: var(--bg);
      color: var(--fg);
      font-size: 16px;
      line-height: 1.5;
      transition: background .2s, color .2s;
    }

    /* ── NAV ── */
    #app-nav {
      max-width: 900px;
      margin: 1rem auto 2rem;
      background: var(--card);
      border-radius: 4px;
      box-shadow: 0 1px 2px rgba(0,0,0,.06), 0 1px 3px rgba(0,0,0,.08);
      display: flex;
      flex-direction: column;
      padding: 1rem 1rem 1.25rem;
    }
    .nav-top-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .nav-title-section {
      text-align: center;
      padding-top: 0.75rem;
    }
    .nav-title-section .nav-main-title {
      font-size: 1.5rem;
      font-weight: 700;
      color: var(--fg);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.4rem;
    }
    .nav-title-section .nav-main-title.hidden-on-session {
      display: none;
    }
    .nav-title-section .nav-sub-title {
      font-size: 14px;
      color: var(--muted-fg);
      margin-top: 4px;
    }

    .nav-logo {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 1.5rem;
      font-weight: 700;
      color: var(--fg);
      cursor: pointer;
      padding: 0;
      border-radius: 4px;
      border: none;
      background: none;
      font-family: var(--font);
      flex-shrink: 0;
    }

    .nav-logo i {
      font-size: 1.2rem;
      color: var(--primary);
      vertical-align: middle;
    }

    .nav-back {
      background: none;
      border: none;
      cursor: pointer;
      width: 2rem;
      height: 2rem;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 4px;
      color: var(--fg);
      font-size: 1.1rem;
      flex-shrink: 0;
    }

    .nav-back:hover {
      background: var(--surface);
    }

    .dark-btn {
      margin-left: auto;
      background: var(--surface);
      border: none;
      cursor: pointer;
      width: 2.5rem;
      height: 2.5rem;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 50%;
      color: var(--hint);
      font-size: 1.2rem;
      flex-shrink: 0;
      transition: all .3s;
    }

    .dark-btn:hover { transform: scale(1.1); }

    /* ── PAGES ── */
    .page {
      display: none;
      min-height: 100vh;
    }

    .page.active {
      display: block;
    }

    /* ── HOME ── */
    #page-home .page-inner {
      max-width: 900px;
      margin: 0 auto;
      padding: 0 1rem 40px;
    }

    .home-header {
      margin-bottom: 24px;
    }

    .home-header h1 {
      font-size: 22px;
      font-weight: 700;
    }

    .home-header p {
      font-size: 15px;
      color: var(--muted-fg);
      margin-top: 4px;
    }

    .session-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 18px 16px;
      margin-bottom: 12px;
      cursor: pointer;
      transition: box-shadow .15s;
    }

    .session-card:hover {
      box-shadow: 0 2px 8px rgba(0, 0, 0, .08);
    }

    .session-card-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      margin-bottom: 10px;
    }

    .session-card-title {
      font-size: 16px;
      font-weight: 700;
    }

    .session-card-subtitle {
      font-size: 13px;
      color: var(--muted-fg);
      margin-top: 2px;
    }

    .session-card-date {
      font-size: 12px;
      color: var(--hint);
      background: var(--surface);
      padding: 3px 8px;
      border-radius: var(--radius);
      white-space: nowrap;
    }

    .session-card-footer {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .session-prog-bar {
      flex: 1;
      height: 6px;
      background: var(--surface);
      border-radius: var(--radius);
      overflow: hidden;
    }

    .session-prog-fill {
      height: 100%;
      background: var(--primary);
      border-radius: var(--radius);
      transition: width .3s;
    }

    .session-prog-label {
      font-size: 12px;
      color: var(--muted-fg);
      white-space: nowrap;
    }

    .session-start-btn {
      display: flex;
      align-items: center;
      gap: 4px;
      background: var(--primary);
      color: #fff;
      border: none;
      border-radius: var(--radius);
      padding: 8px 14px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      font-family: var(--font);
    }

    .session-start-btn:hover {
      background: var(--primary-dark);
    }

    /* ── AUDIO PLAYER ── */
    .player-wrap {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 14px 16px 12px;
      margin-bottom: 1rem;
    }
    .player-inner {
      max-width: 100%;
    }

    /* Error state */
    .player-error {
      background: var(--cta-bg);
      border: 1px solid var(--cta);
      border-radius: var(--radius);
      padding: 12px 14px;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .player-error-head {
      display: flex;
      align-items: center;
      gap: 7px;
      font-size: 14px;
      font-weight: 700;
      color: var(--cta);
    }

    .player-error-head i {
      font-size: 18px;
    }

    .player-error-body {
      font-size: 13px;
      color: var(--muted-fg);
      line-height: 1.6;
    }

    .player-error-cmd {
      font-family: monospace;
      font-size: 12px;
      background: var(--surface);
      border-radius: var(--radius);
      padding: 8px 10px;
      color: var(--fg);
      margin-top: 4px;
      word-break: break-all;
      white-space: pre-wrap;
    }

    /* Player UI */
    .player-ui {
      display: none;
    }

    .player-ui.ready {
      display: block;
    }

    /* Seek row */
    .player-seek-row {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 10px;
    }

    .player-time {
      font-size: 12px;
      color: var(--muted-fg);
      font-variant-numeric: tabular-nums;
      white-space: nowrap;
      min-width: 36px;
    }

    .player-time.dur {
      text-align: right;
    }

    .player-seek-track {
      flex: 1;
      position: relative;
      height: 20px;
      display: flex;
      align-items: center;
      cursor: pointer;
    }

    .player-seek-bg {
      position: absolute;
      left: 0;
      right: 0;
      top: 50%;
      transform: translateY(-50%);
      height: 4px;
      background: var(--border);
      border-radius: var(--radius);
    }

    .player-seek-fill {
      position: absolute;
      left: 0;
      top: 50%;
      transform: translateY(-50%);
      height: 4px;
      background: var(--primary);
      border-radius: var(--radius);
      width: 0;
      pointer-events: none;
      transition: width .1s linear;
    }

    .player-seek-input {
      position: absolute;
      left: 0;
      top: 0;
      width: 100%;
      height: 100%;
      opacity: 0;
      cursor: pointer;
      margin: 0;
      z-index: 2;
      -webkit-appearance: none;
    }

    .player-seek-thumb {
      position: absolute;
      top: 50%;
      transform: translate(-50%, -50%);
      width: 14px;
      height: 14px;
      background: var(--primary);
      border-radius: 50%;
      pointer-events: none;
      z-index: 1;
      left: 0;
    }

    /* Controls row */
    .player-controls {
      display: flex;
      align-items: center;
      gap: 8px;
      justify-content: center;
    }

    .player-btn {
      background: none;
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: var(--radius);
      font-family: var(--font);
    }

    .skip-btn {
      width: 38px;
      height: 38px;
      font-size: 22px;
      color: var(--muted-fg);
    }

    .skip-btn:hover {
      background: var(--surface);
    }

    .play-btn {
      width: 48px;
      height: 48px;
      font-size: 26px;
      background: var(--primary);
      color: #fff;
      border-radius: 50%;
      transition: background .15s;
    }

    .play-btn:hover {
      background: var(--primary-dark);
    }

    .speed-selector {
      display: flex;
      gap: 3px;
      margin-left: 8px;
    }

    .speed-btn {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 4px 7px;
      font-size: 12px;
      font-weight: 600;
      color: var(--muted-fg);
      cursor: pointer;
      font-family: var(--font);
      transition: all .15s;
    }

    .speed-btn:hover {
      border-color: var(--primary);
      color: var(--primary);
    }

    .speed-btn.active {
      background: var(--primary-bg);
      border-color: var(--primary);
      color: var(--primary);
    }

    /* ── SESSION ── */
    .session-content {
      max-width: 900px;
      margin: 0 auto;
      padding: 0 1rem 40px;
    }

    .back-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 2rem;
      height: 2rem;
      background: none;
      border: none;
      border-radius: 4px;
      font-size: 1.1rem;
      color: var(--fg);
      cursor: pointer;
      flex-shrink: 0;
    }
    .back-btn:hover { background: var(--surface); }

    .session-header-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 1rem;
    }
    .session-header-left {
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .session-title-text {
      font-size: 17px;
      font-weight: 700;
    }

    .session-subtitle-text {
      font-size: 13px;
      color: var(--muted-fg);
      margin-top: 2px;
    }

    .reset-btn {
      display: flex;
      align-items: center;
      gap: 4px;
      background: none;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 6px 10px;
      font-size: 13px;
      color: var(--muted-fg);
      cursor: pointer;
      font-family: var(--font);
    }

    .reset-btn:hover {
      background: var(--surface);
    }

    /* Score */
    .score-bar {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 12px 14px;
      margin-bottom: 14px;
    }

    .score-info {
      display: flex;
      align-items: baseline;
      gap: 3px;
      margin-bottom: 8px;
    }

    .score-correct {
      font-size: 24px;
      font-weight: 700;
      color: var(--success);
    }

    .score-divider {
      font-size: 18px;
      color: var(--hint);
    }

    .score-total {
      font-size: 16px;
      color: var(--muted-fg);
    }

    .score-label {
      font-size: 14px;
      color: var(--hint);
      margin-left: 4px;
    }

    .score-row {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .score-progress-track {
      flex: 1;
      height: 8px;
      background: var(--surface);
      border-radius: var(--radius);
      overflow: hidden;
    }

    .score-progress-fill {
      height: 100%;
      background: var(--success);
      border-radius: var(--radius);
      width: 0;
      transition: width .4s;
    }

    .score-answered {
      font-size: 13px;
      color: var(--hint);
      white-space: nowrap;
    }

    /* Q Grid */
    .q-grid-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 12px 14px;
      margin-bottom: 14px;
    }
    .q-grid {
      display: grid;
      grid-template-columns: repeat(10, 1fr);
      gap: 5px;
    }

    .q-grid-btn {
      aspect-ratio: 1;
      border-radius: var(--radius);
      border: 1px solid var(--border);
      background: var(--card);
      color: var(--muted-fg);
      font-size: 16px;
      font-weight: 600;
      font-family: var(--font);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background .15s, color .15s, border-color .15s;
    }

    .q-grid-btn.correct {
      background: var(--success-bg);
      color: var(--success);
      border-color: var(--success);
    }

    .q-grid-btn.wrong {
      background: var(--fail-bg);
      color: var(--fail);
      border-color: var(--fail);
    }

    /* Question card */
    .q-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      margin-bottom: 12px;
      overflow: hidden;
      scroll-margin-top: calc(var(--nav-h) + 4px);
    }

    .q-card-head {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 12px 14px 10px;
      border-bottom: 1px solid var(--border);
    }

    .q-num-badge {
      width: 26px;
      height: 26px;
      flex-shrink: 0;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      font-weight: 700;
      background: var(--surface);
      color: var(--muted-fg);
    }

    .q-num-badge.correct {
      background: var(--success-bg);
      color: var(--success);
    }

    .q-num-badge.wrong {
      background: var(--fail-bg);
      color: var(--fail);
    }

    .q-type-badge {
      font-size: 11px;
      color: var(--hint);
      background: var(--surface);
      padding: 2px 7px;
      border-radius: var(--radius);
    }

    .q-card-body {
      padding: 14px;
    }

    .q-text {
      font-size: 15px;
      color: var(--fg);
      line-height: 1.55;
      margin-bottom: 12px;
    }

    /* Image options */
    .img-opts-row {
      display: flex;
      gap: 8px;
    }

    .img-opt-btn {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
      border: 2px solid var(--border);
      border-radius: var(--radius);
      background: var(--card);
      padding: 8px 4px 6px;
      cursor: pointer;
      font-family: var(--font);
      transition: all .15s;
      position: relative;
      overflow: hidden;
    }

    .img-opt-btn:hover:not(:disabled) {
      border-color: var(--primary);
      background: var(--primary-bg);
    }

    .img-opt-btn img {
      width: 100%;
      aspect-ratio: 1;
      object-fit: contain;
      display: block;
    }

    .img-opt-btn .opt-num {
      font-size: 20px;
      font-weight: 700;
      color: var(--primary);
      line-height: 1;
    }

    .img-opt-btn.selected-correct {
      border-color: var(--success);
      background: var(--success-bg);
    }

    .img-opt-btn.selected-correct .opt-num {
      color: var(--success);
    }

    .img-opt-btn.correct-answer {
      border-color: var(--success);
      background: var(--success-bg);
    }

    .img-opt-btn.correct-answer .opt-num {
      color: var(--success);
    }

    .img-opt-btn.selected-wrong {
      border-color: var(--fail);
      background: var(--fail-bg);
    }

    .img-opt-btn.selected-wrong .opt-num {
      color: var(--fail);
    }

    .img-opt-btn:disabled {
      cursor: default;
    }

    /* feedback icon overlay on image option */
    .img-opt-btn .img-fb-icon {
      position: absolute;
      top: 4px;
      right: 4px;
      font-size: 16px;
      display: none;
    }

    .img-opt-btn.selected-correct .img-fb-icon,
    .img-opt-btn.correct-answer .img-fb-icon,
    .img-opt-btn.selected-wrong .img-fb-icon {
      display: block;
    }

    .img-opt-btn.selected-correct .img-fb-icon,
    .img-opt-btn.correct-answer .img-fb-icon {
      color: var(--success);
    }

    .img-opt-btn.selected-wrong .img-fb-icon {
      color: var(--fail);
    }

    /* Text options */
    .text-opts {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .text-opt-btn {
      display: flex;
      align-items: center;
      gap: 10px;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      background: var(--card);
      color: var(--fg);
      padding: 10px 12px;
      font-size: 15px;
      cursor: pointer;
      font-family: var(--font);
      text-align: left;
      width: 100%;
      transition: all .15s;
    }

    .text-opt-btn:hover:not(:disabled) {
      border-color: var(--primary);
      background: var(--primary-bg);
    }

    .text-opt-btn .opt-label {
      font-size: 20px;
      font-weight: 700;
      color: var(--primary);
      flex-shrink: 0;
      width: 22px;
      text-align: center;
    }

    .text-opt-btn .opt-text {
      flex: 1;
    }

    .text-opt-btn.selected-correct {
      border-color: var(--success);
      background: var(--success-bg);
    }

    .text-opt-btn.selected-correct .opt-label {
      color: var(--success);
    }

    .text-opt-btn.correct-answer {
      border-color: var(--success);
      background: var(--success-bg);
    }

    .text-opt-btn.correct-answer .opt-label {
      color: var(--success);
    }

    .text-opt-btn.selected-wrong {
      border-color: var(--fail);
      background: var(--fail-bg);
    }

    .text-opt-btn.selected-wrong .opt-label {
      color: var(--fail);
    }

    .text-opt-btn:disabled {
      cursor: default;
    }

    /* Table */
    .q-table {
      width: 100%;
      border-collapse: collapse;
      margin-bottom: 12px;
      font-size: 14px;
    }

    .q-table th {
      background: var(--primary-bg);
      color: var(--primary-dark);
      padding: 8px 10px;
      text-align: left;
      border: 1px solid var(--border);
      font-weight: 600;
    }

    .q-table td {
      padding: 8px 10px;
      border: 1px solid var(--border);
      vertical-align: top;
    }

    .q-table tr:nth-child(even) td {
      background: var(--surface);
    }

    .q-table .row-label {
      font-weight: 700;
      color: var(--primary);
      width: 28px;
    }

    /* Dialogue */
    .dialogue-context {
      background: var(--primary-bg);
      border: 1px solid #85B7EB;
      border-radius: var(--radius);
      padding: 12px 14px;
      margin-bottom: 12px;
    }

    .dialogue-line {
      font-size: 14px;
      color: #0C447C;
      line-height: 1.7;
    }

    .dialogue-blank {
      display: inline-block;
      border-bottom: 2px solid var(--primary);
      min-width: 120px;
      vertical-align: middle;
    }

    body.dark .dialogue-context {
      border-color: #1e3a5c;
    }

    body.dark .dialogue-line {
      color: #85B7EB;
    }

    /* Feedback */
    .feedback-bar {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 12px;
      border-radius: var(--radius);
      font-size: 14px;
      font-weight: 600;
      margin-top: 12px;
    }

    .feedback-bar.correct {
      background: var(--success-bg);
      color: var(--success-dark);
    }

    .feedback-bar.wrong {
      background: var(--fail-bg);
      color: var(--fail-dark);
    }

    .feedback-bar i {
      font-size: 18px;
      flex-shrink: 0;
    }

    /* Script */
    .script-toggle-btn {
      display: flex;
      align-items: center;
      gap: 6px;
      background: none;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--muted-fg);
      padding: 7px 12px;
      font-size: 13px;

    /* ── RESULT PAGE ── */
    .result-content {

    .result-header-bar {

    .result-session-info .result-sub {

    .result-score-card {

    .result-score-denom {

    .result-score-pct {

    .result-progress-track {
      height: 8px;
      background: var(--surface);
      border-radius: var(--radius);

      margin-top: 14px;
    }

    .result-progress-fill {
      height: 100%;
      background: var(--success);
      border-radius: var(--radius);

    }

    .result-action-row {

    .result-action-btn {
      display: flex;
      align-items: center;
      gap: 6px;
      border-radius: var(--radius);
      padding: 10px 22px;
      font-size: 14px;
      font-weight: 600;

    .result-q-card {

      font-weight: 700;
      color: var(--primary-dark);
      text-transform: uppercase;

      line-height: 1.75;

    }

    body.dark .result-script-text,

  .gate-btn {

</head>

<body>

  <!-- NAV -->

  <!-- HOME PAGE -->

    <!-- Session content -->
    <div class="session-content">

      <div class="session-header-bar">
        <div class="session-header-left">

            <div class="session-title-text" id="session-title-text"></div>

        </div>

        <div class="player-inner">

              <div class="player-error-cmd" id="error-cmd">yt-dlp -x --audio-format m4a -o "audio/세션ID.m4a" [유튜브URL]</div>

          </div>
          <!-- Player UI -->

              </button>

        </div>

      <!-- Progress (exam mode only shows answered count) -->

  <script>
    /* ══════════════════════════════════════════
       SESSION DATA
       audioFile: "https://dfpmpbjhljsyypofpvfu.supabase.co/storage/v1/object/public/listening-audio/{id}.m4a" — 같은 폴더 내 audio/ 디렉토리
       youtubeUrl: 다운로드 참고용
    ══════════════════════════════════════════ */
    const SESSIONS = [
      {
        id: "2019_m1_r1",
        title: "2019학년도 제1회",
        subtitle: "중1 영어듣기능력평가",
        date: "2019. 4. 9.",
        audioFile: "https://dfpmpbjhljsyypofpvfu.supabase.co/storage/v1/object/public/listening-audio/2019_m1_r1.m4a",
        youtubeUrl: "",
        questions: [
          { num: 1, type: "image", q: "다음을 듣고, ‘I’가 무엇인지 가장 적절한 것을 고르시오.", options: ["images/2019_m1_r1/q1_1.jpg", "images/2019_m1_r1/q1_2.jpg", "images/2019_m1_r1/q1_3.jpg", "images/2019_m1_r1/q1_4.jpg", "images/2019_m1_r1/q1_5.jpg"], answer: 1, script: "W: I live in the sea. I am very soft and slippery. I have a round head. I also have two eyes and eight legs. I sometimes shoot dark ink. What am I?" },
          { num: 2, type: "image", q: "대화를 듣고, 여자가 구입할 마스크로 가장 적절한 것을 고르시오.", options: ["images/2019_m1_r1/q2_1.jpg", "images/2019_m1_r1/q2_2.jpg", "images/2019_m1_r1/q2_3.jpg", "images/2019_m1_r1/q2_4.jpg", "images/2019_m1_r1/q2_5.jpg"], answer: 4, script: "M: Hello. How may I help you?\nW: I’d like to buy a mask for my friend.\nM: How about this one with dots?\nW: Well, I like that one with a heart better.\nM: Okay. Here’s the mask.\nW: Great! I’ll take it." },
          { num: 3, type: "image", q: "다음을 듣고, 내일 오후의 날씨로 가장 적절한 것을 고르시오.", options: ["images/2019_m1_r1/q3_1.jpg", "images/2019_m1_r1/q3_2.jpg", "images/2019_m1_r1/q3_3.jpg", "images/2019_m1_r1/q3_4.jpg", "images/2019_m1_r1/q3_5.jpg"], answer: 5, script: "M: Good morning! Here is the weather report. It’s raining a lot now, but it will stop tomorrow morning. Tomorrow afternoon will be sunny. So, you can enjoy the beautiful weather and outdoor activities." },
          { num: 4, type: "text", q: "대화를 듣고, 여자가 한 마지막 말의 의도로 가장 적절한 것을 고르시오.", options: ["감사", "사과", "불평", "거절", "승낙"], answer: 1, script: "M: Jessy, how was your violin performance?\nW: It was bad, Dad! I made many mistakes.\nM: Don’t worry. You just need more practice.\nW: Do you think so?\nM: Yes, you’ll do better next time. Cheer up!\nW: Thanks for trying to cheer me up, Dad." },
          { num: 5, type: "text", q: "다음을 듣고, 남자가 경기에 대해 언급하지 않은 것을 고르시오.", options: ["종목", "상대팀", "날짜", "시작 시간", "장소"], answer: 2, script: "M: Hello, students. Our school basketball team will play its final game. The basketball game will be on May 4th. It’ll start at 10 in the morning. The game will be at Daehan Stadium. Come and enjoy the game. Hope to see you there!" },
          { num: 6, type: "text", q: "대화를 듣고, 두 사람이 만날 시각을 고르시오.", options: ["1:00p.m.", "1:30p.m.", "2:00p.m.", "2:30p.m.", "3:00p.m."], answer: 2, script: "M: Sora, are you going to the flower festival this Sunday?\nW: Yes, I am. What about you?\nM: Me, too. Let’s go together in the afternoon.\nW: Sure. Why don’t we meet at 2?\nM: I want to get there early. How about 1:30?\nW: Okay. See you then." },
          { num: 7, type: "text", q: "대화를 듣고, 여자의 장래 희망으로 가장 적절한 것을 고르시오.", options: ["교사", "의사", "변호사", "공무원", "사진 작가"], answer: 5, script: "M: Miranda, what are those pictures?\nW: I took these pictures of trees for my homework.\nM: Wow, they’re so good! You did a great job!\nW: Thanks. I want to be a photographer someday.\nM: Cool! I’m sure you can be a great photographer.\nW: I hope so, too." },
          { num: 8, type: "text", q: "대화를 듣고, 남자의 고양이에 대한 내용으로 일치하지 않는 것을 고르시오.", options: ["삼촌이 주셨다.", "흰색 털을 가지고 있다.", "작년에 태어났다.", "이름이 Prince이다.", "눈이 갈색이다."], answer: 5, script: "W: Tom, is this your cat?\nM: Yes, my uncle gave him to me.\nW: Oh, his white hair is so soft. How old is he?\nM: Um... He was born last year.\nW: What’s his name?\nM: His name is Prince.\nW: I love his blue eyes." },
          { num: 9, type: "text", q: "대화를 듣고, 여자가 대화 직후에 할 일로 가장 적절한 것을 고르시오.", options: ["길 안내하기", "방 청소하기", "먹이 구입하기", "동물 사진 찍기", "체험 보고서 쓰기"], answer: 3, script: "M: Mom, I like this zoo!\nW: Me, too. Tom, look at those little rabbits.\nM: Oh, they’re so cute. Can I give them some food?\nW: Let me see. [Pause] Oh, look! There’s a sign.\nM: It says we can feed them.\nW: Great! I’ll buy some food for the rabbits now." },
          { num: 10, type: "text", q: "대화를 듣고, 무엇에 관한 내용인지 가장 적절한 것을 고르시오.", options: ["응원가 부르기", "미래 집 그리기", "새 학기 계획하기", "요리 영상 만들기", "전통 시장 방문하기"], answer: 2, script: "W: Jamie, what are you doing?\nM: I’m drawing my future house, Mom.\nW: Tell me more about it.\nM: I want a big house with many rooms.\nW: Oh, that’s nice. Is this a swimming pool?\nM: Yes! I want to have a big pool in the future.\nW: Cool!" },
          { num: 11, type: "text", q: "대화를 듣고, 여자가 이용할 교통수단으로 가장 적절한 것을 고르시오.", options: ["배", "택시", "버스", "지하철", "자전거"], answer: 2, script: "W: Excuse me, which bus goes to City Hall?\nM: Number 61. It comes every 30 minutes.\nW: 30 minutes?\nM: Yes, why don’t you go by taxi? It only takes 10 minutes from here.\nW: That’s good. I’ll take a taxi. Thank you." },
          { num: 12, type: "text", q: "대화를 듣고, 남자가 기차역에 간 이유로 가장 적절한 것을 고르시오.", options: ["아빠를 만나기 위해서", "분실물을 찾기 위해서", "기차표를 바꾸기 위해서", "가족여행을 가기 위해서", "직업체험을 하기 위해서"], answer: 1, script: "W: Jackson, why do you look so tired?\nM: I went to the train station early this morning.\nW: Why did you go there?\nM: I went there to see my dad. He came back from his business trip.\nW: Wow, how sweet of you!" },
          { num: 13, type: "text", q: "대화를 듣고, 두 사람이 대화하는 장소로 가장 적절한 곳을 고르시오.", options: ["식당", "공원", "사진관", "경찰서", "동물 병원"], answer: 5, script: "M: Hello, what’s the problem?\nW: Doctor, my dog can’t walk well.\nM: Let me see. What happened to her?\nW: I think she broke her leg.\nM: I need to take an X-ray of it.\nW: Okay.\nM: The X-ray room is right over here. Come this way." },
          { num: 14, type: "text", q: "대화를 듣고, Dream Bank의 위치로 가장 알맞은 것을 고르시오.", options: ["①", "②", "③", "④", "⑤"], answer: 2, script: "M: Excuse me. Is there a bank nearby?\nW: Yes, Dream Bank isn’t far from here.\nM: Great! How can I get there?\nW: Go straight one block and turn left at Main Street.\nM: Turn left at Main Street?\nW: Yes, it’ll be on your right. It’s next to the church.\nM: Thanks." },
          { num: 15, type: "text", q: "대화를 듣고, 남자가 여자에게 부탁한 일로 가장 적절한 것을 고르시오.", options: ["책 가져오기", "영화 추천하기", "학교 안내하기", "춤 가르쳐주기", "자전거 빌려오기"], answer: 1, script: "M: Seri, how about making our own class library?\nW: Good idea, Brandon.\nM: I think it’ll be good for everyone to share books.\nW: I agree with you.\nM: Thanks. Then, can you bring one or two books?\nW: Sure, I’ll bring my favorite books." },
          { num: 16, type: "text", q: "대화를 듣고, 여자가 남자에게 제안한 것으로 가장 적절한 것을 고르시오.", options: ["코딩 배우기", "목공예품 만들기", "손글씨 책 구입하기", "모형 자동차 조립하기", "라디오 방송국 방문하기"], answer: 3, script: "M: Mina, your handwriting is really beautiful.\nW: Thank you, Tom. I practice it every day with this book.\nM: Is it helpful?\nW: Yes, it’s easy to follow.\nM: I want to have better handwriting.\nW: Then, why don’t you buy a handwriting book?\nM: Good idea." },
          { num: 17, type: "text", q: "대화를 듣고, 여자가 휴일에 한 일로 가장 적절한 것을 고르시오.", options: ["공연 관람하기", "과학 숙제하기", "밴드 연습하기", "가족 농장 가기", "과일 가게 가기"], answer: 4, script: "W: Chris, did you have a good holiday?\nM: Yes, I practiced with my band for a concert. What about you?\nW: I went to the family farm with my parents.\nM: That sounds fun! What vegetables do you grow?\nW: We grow tomatoes and carrots." },
          { num: 18, type: "text", q: "대화를 듣고, 남자의 직업으로 가장 적절한 것을 고르시오.", options: ["아나운서", "배구 선수", "교통 경찰", "피아니스트", "한식 요리사"], answer: 3, script: "M: Excuse me, ma’am.\nW: Oh, what’s the problem, Officer?\nM: You were driving too fast.\nW: Really? I didn’t know that.\nM: It’s a school zone here. So, you need to slow down.\nW: Sorry, I didn’t see the sign.\nM: Can I see your driver’s license?\nW: Here you are." },
          { num: 19, type: "dialogue", q: "W: Mike, do you have any plans this evening?", options: ["I like music.", "Don’t give up.", "Congratulations!", "Sure, no problem.", "Long time no see."], answer: 4, script: "M: No, I don’t. Why?\nW: Let’s see the fireworks in Central Park tonight.\nM: Great! What time do you want to meet?\nW: How about 6:30? Let’s go there early and enjoy other fun events.\nM: Okay. Can you bring your camera?\nW: ________________________________________________" },
          { num: 20, type: "dialogue", q: "W: Hello. May I help you?", options: ["It’s 9 o’clock.", "I enjoy writing.", "It’s in the corner.", "I want a large soda.", "We don’t have your size."], answer: 3, script: "M: Yes, please. I like this T-shirt.\nW: What’s your size?\nM: Do you have this in a small?\nW: Sure. [Pause] Here it is. You can try it on.\nM: Okay, thank you. Where is the fitting room?\nW: ________________________________________________\nANN:" }
        ]
      },
      {
        id: "2019_m1_r2",
        title: "2019학년도 제2회",
        subtitle: "중1 영어듣기능력평가",
        date: "2019. 9. 10.",
        audioFile: "https://dfpmpbjhljsyypofpvfu.supabase.co/storage/v1/object/public/listening-audio/2019_m1_r2.m4a",
        youtubeUrl: "",
        questions: [
          { num: 1, type: "image", q: "다음을 듣고, ‘this’가 가리키는 것으로 가장 적절한 것을 고르시오.", options: ["images/2019_m1_r2/q1_1.jpg", "images/2019_m1_r2/q1_2.jpg", "images/2019_m1_r2/q1_3.jpg", "images/2019_m1_r2/q1_4.jpg", "images/2019_m1_r2/q1_5.jpg"], answer: 3, script: "M: This can come in many colors. You need this outdoors. You use this on rainy or snowy days. This keeps your hair and clothes from getting wet.\nWhat is this?" },
          { num: 2, type: "image", q: "대화를 듣고, 여자가 구입한 양초로 가장 적절한 것을 고르시오.", options: ["images/2019_m1_r2/q2_1.jpg", "images/2019_m1_r2/q2_2.jpg", "images/2019_m1_r2/q2_3.jpg", "images/2019_m1_r2/q2_4.jpg", "images/2019_m1_r2/q2_5.jpg"], answer: 4, script: "M: May I help you?\nW: Yes, I’m looking for a candle for my mother.\nM: How about this one with a heart on it?\nW: It’s okay, but she really likes flowers.\nM: Then, how about this one with a rose on it?\nW: It’s pretty! I’ll take it." },
          { num: 3, type: "image", q: "다음을 듣고, 일요일의 날씨로 가장 적절한 것을 고르시오.", options: ["images/2019_m1_r2/q3_1.jpg", "images/2019_m1_r2/q3_2.jpg", "images/2019_m1_r2/q3_3.jpg", "images/2019_m1_r2/q3_4.jpg", "images/2019_m1_r2/q3_5.jpg"], answer: 1, script: "M: Good morning, everyone! This is the weekly weather forecast. This week, we’ll have nice autumn weather with mostly sunny skies. However, on\nSunday, it’ll rain across the whole country. Thank you." },
          { num: 4, type: "text", q: "대화를 듣고, 여자가 한 마지막 말의 의도로 가장 적절한 것을 고르시오.", options: ["위로", "당부", "거절", "칭찬", "감사"], answer: 2, script: "M: Ms. Smith, may I use the English Room during lunchtime?\nW: Yes. Why do you need it?\nM: Mike and I are going to practice storytelling.\nW: I see. How long will it take?\nM: About 30 minutes.\nW: Don’t forget to turn off the lights when you leave." },
          { num: 5, type: "text", q: "다음을 듣고, 여자가 건물에 대해 언급하지 않은 것을 고르시오.", options: ["이름", "건축가", "지어진 연도", "색상", "높이"], answer: 2, script: "W: Let me introduce a famous building in my town. The name of this beautiful building is Ocean Tower. The building was built in 1987. Its color is bright green. It is 100 meters high." },
          { num: 6, type: "text", q: "대화를 듣고, 두 사람이 출발할 시각을 고르시오.", options: ["4:30a.m.", "5:00a.m.", "5:30a.m.", "6:00a.m.", "6:30a.m."], answer: 4, script: "M: Nami, are you excited to go see the sunrise tomorrow?\nW: Of course, Dad! What time should we leave?\nM: Maybe 5:30 in the morning?\nW: Oh, that’s too early!\nM: But we need to be there before 6:30.\nW: Then, let’s leave at 6.\nM: Okay. Good night." },
          { num: 7, type: "text", q: "대화를 듣고, 여자의 장래 희망으로 가장 적절한 것을 고르시오.", options: ["영화 감독", "방송 작가", "로봇 엔지니어", "의상 디자이너", "컴퓨터 프로그래머"], answer: 3, script: "M: Amy, you’re drawing robots again.\nW: Yes, I love robots! I also read a lot of books about them.\nM: Wow, that sounds cool!\nW: My dream is to be a robot engineer.\nM: I hope your dream comes true." },
          { num: 8, type: "text", q: "대화를 듣고, 남자가 다녀온 여행에 대한 내용으로 일치하지 않는 것을", options: ["제주도에 다녀왔다.", "해산물을 먹었다.", "박물관을 방문했다.", "한라산에 갔다.", "바다에서 수영했다."], answer: 4, script: "W: Minho, I heard you went to Jeju.\nM: Yes, it was wonderful! I ate lots of sea food.\nW: That’s nice. What else did you do there?\nM: I visited many museums.\nW: Did you go to Hallasan?\nM: No, I didn’t.\nW: Then, what did you do?\nM: I swam in the sea." },
          { num: 9, type: "text", q: "대화를 듣고, 여자가 대화 직후에 할 일로 가장 적절한 것을 고르시오.", options: ["짐 옮기기", "길 물어보기", "장소 검색하기", "요금 지불하기", "안전벨트 매기"], answer: 5, script: "M: Hello, where do you want to go?\nW: Hi, I’d like to go to the bus terminal.\nM: Okay, wear your seatbelt, please.\nW: Excuse me? But I’m sitting in the back of a taxi.\nM: Everyone has to wear their seatbelts these days.\nW: Okay, I will." },
          { num: 10, type: "text", q: "대화를 듣고, 무엇에 관한 내용인지 가장 적절한 것을 고르시오.", options: ["권장 도서 안내", "공연 관람 규칙", "자원 절약 방법", "식품 안전 교육", "지진 대피 훈련"], answer: 2, script: "W: Scott, what are you looking at?\nM: I’m looking at the rules to follow while watching the show.\nW: Let’s see. [Pause] Oh, we should turn off our phones before the show.\nM: I already turned mine off.\nW: What else?\nM: We shouldn’t take any food inside." },
          { num: 11, type: "text", q: "대화를 듣고, 남자가 부산에서 이용한 교통수단을 고르시오.", options: ["버스", "택시", "기차", "자전거", "오토바이"], answer: 1, script: "W: Seho, how was your trip to Busan?\nM: It was great!\nW: I heard you can take bicycle tours there.\nM: Right, but I couldn’t because too many people were waiting for the bicycles.\nW: Really? Then, how did you look around?\nM: I took the city tour bus." },
          { num: 12, type: "text", q: "대화를 듣고, 남자가 옷을 구입한 이유로 가장 적절한 것을 고르시오.", options: ["면접에서 입기 위해서", "여행 가서 입기 위해서", "생일 파티에서 입기 위해서", "공연 의상으로 입기 위해서", "사촌 결혼식에서 입기 위해서"], answer: 5, script: "W: Hi, Kyle. Did you buy something? What’s in the bag?\nM: Hi, Lisa. Yes, I bought a new suit.\nW: Oh, why did you buy it?\nM: I’m going to wear it to my cousin’s wedding.\nW: Can I see it?\nM: Sure. Take a look.\nW: It’s great! I like the color." },
          { num: 13, type: "text", q: "대화를 듣고, 두 사람의 관계로 가장 적절한 것을 고르시오.", options: ["동요 작곡가－가수", "드라마 작가－연출가", "오디션 참가자－심사 위원", "오케스트라 단원－지휘자", "공원 캠핑장 이용객－관리인"], answer: 5, script: "W: Excuse me, sir. Can I set up my tent here?\nM: No. One of our park rules is that you cannot set up tents here.\nW: Then, where should I go?\nM: Look at this map. The camping zone is on the other side of the park.\nW: Thank you." },
          { num: 14, type: "text", q: "대화를 듣고, 여자가 찾고 있는 이어폰의 위치로 가장 알맞은 것을 고르시오.", options: ["①", "②", "③", "④", "⑤"], answer: 3, script: "[Cellphone rings.]\nM: Hi, Mom.\nW: Hello, Tony. Where did you put my earphones?\nM: I think they’re on my bed.\nW: Well, I checked your bed, but I couldn’t find them.\nM: Then, did you look on my desk?\nW: Oh, I see them on your desk. Thanks." },
          { num: 15, type: "text", q: "대화를 듣고, 여자가 남자에게 부탁한 일로 가장 적절한 것을 고르시오.", options: ["설거지 하기", "분리수거 하기", "마스크 사오기", "책 반납 하기", "세탁물 찾아오기"], answer: 3, script: "[Cellphone rings.]\nM: Hello, Suji.\nW: Hi, Dad. Where are you?\nM: I’m on my way home.\nW: Did you hear the news about the bad air tomorrow?\nM: Yes, I did. I’m really worried about it.\nW: Could you buy some masks before you come home?\nM: Sure, no problem." },
          { num: 16, type: "text", q: "대화를 듣고, 남자가 여자에게 제안한 것으로 가장 적절한 것을 고르시오.", options: ["가족 여행 가기", "컴퓨터 구입하기", "독서 감상문 쓰기", "중국어 함께 배우기", "모형 자동차 만들기"], answer: 4, script: "W: Tim, what are you going to do this vacation?\nM: I’m going to study Chinese in the Community Center.\nW: Oh, that sounds good.\nM: Can you speak Chinese?\nW: No, but I want to learn.\nM: Really? Then, why don’t we learn Chinese together?\nW: That’s a great idea!" },
          { num: 17, type: "text", q: "대화를 듣고, 남자가 휴일에 한 일로 가장 적절한 것을 고르시오.", options: ["동생 돌보기", "드론 날리기", "케이크 만들기", "거실 청소하기", "가족사진 찍기"], answer: 5, script: "W: Minsu, how was your holiday?\nM: It was nice.\nW: What did you do?\nM: All of my family members dressed up, and we took a family picture together.\nW: Wow! That sounds wonderful.\nM: Yeah, it was my first time to take a picture with my grandparents." },
          { num: 18, type: "text", q: "대화를 듣고, 남자의 직업으로 가장 적절한 것을 고르시오.", options: ["성우", "화가", "요리사", "소방관", "경찰관"], answer: 1, script: "W: Mr. Wilson, this is today’s script.\nM: Okay. What’s my role today?\nW: You will act as a 7-year-old boy with your voice.\nM: As you know, I can make various voices.\nW: Right. Your voice characters are always amazing!\nM: Thanks.\nW: Let’s start recording in 10 minutes." },
          { num: 19, type: "dialogue", q: "M: Judy, can you recommend a book for me?", options: ["I like math.", "Sorry, but I can’t.", "Thank you so much.", "Please make yourself at home.", "Don’t worry. You’re doing great!"], answer: 3, script: "W: Sure. What kind of books do you like?\nM: I like stories about families.\nW: Then, you’ll like the book, Three Brothers. It’s really good.\nM: Do you have the book?\nW: Yes. I can lend it to you.\nM: ________________________________________________" },
          { num: 20, type: "dialogue", q: "M: Did you go to the basketball game yesterday?", options: ["It was 61 to", "It started at 2p.m.", "It lasted almost an hour.", "It was held in the school gym.", "It was against Hankuk Middle School."], answer: 1, script: "W: No, I wanted to, but I couldn’t make it.\nM: You missed a good game.\nW: Really? Which team won?\nM: Our school did. They played well.\nW: That’s good news.\nM: Yeah, it was a close game.\nW: So, what was the score?\nM: ________________________________________________\nANN:" }
        ]
      },
      {
        id: "2020_m1_r1",
        title: "2020학년도 제1회",
        subtitle: "중1 영어듣기능력평가",
        date: "2020. 6. 23.",
        audioFile: "https://dfpmpbjhljsyypofpvfu.supabase.co/storage/v1/object/public/listening-audio/2020_m1_r1.m4a",
        youtubeUrl: "",
        questions: [
          { num: 1, type: "image", q: "다음을 듣고, ‘I’가 무엇인지 가장 적절한 것을 고르시오.", options: ["images/2020_m1_r1/q1_1.jpg", "images/2020_m1_r1/q1_2.jpg", "images/2020_m1_r1/q1_3.jpg", "images/2020_m1_r1/q1_4.jpg", "images/2020_m1_r1/q1_5.jpg"], answer: 1, script: "M: I have four legs and large ears. I’m big and heavy. My nose is very long, so I can hold anything with my nose. I eat a lot. What am I?" },
          { num: 2, type: "image", q: "대화를 듣고, 남자가 만든 열쇠고리로 가장 적절한 것을 고르시오.", options: ["images/2020_m1_r1/q2_1.jpg", "images/2020_m1_r1/q2_2.jpg", "images/2020_m1_r1/q2_3.jpg", "images/2020_m1_r1/q2_4.jpg", "images/2020_m1_r1/q2_5.jpg"], answer: 3, script: "W: Yoonho, what’s that?\nM: It’s my key ring.\nW: The star shape looks pretty. Did you make it?\nM: Yes, I made it after school.\nW: I thought you liked diamond shapes.\nM: No, I like stars more." },
          { num: 3, type: "image", q: "다음을 듣고, 토요일의 날씨로 가장 적절한 것을 고르시오.", options: ["images/2020_m1_r1/q3_1.jpg", "images/2020_m1_r1/q3_2.jpg", "images/2020_m1_r1/q3_3.jpg", "images/2020_m1_r1/q3_4.jpg", "images/2020_m1_r1/q3_5.jpg"], answer: 1, script: "W: Good morning. This is the weekly weather report. It’ll be cloudy today.\nIt’ll rain from tomorrow morning to Thursday. On Friday, the weather will be warm. On Saturday, there will be strong winds all day, but on Sunday, we can enjoy a beautiful clear sky." },
          { num: 4, type: "text", q: "대화를 듣고, 남자가 한 마지막 말의 의도로 가장 적절한 것을 고르시오.", options: ["사과", "거절", "위로", "감사", "칭찬"], answer: 3, script: "W: Dad, I heard some bad news.\nM: What is it, Jiwon?\nW: You know my best friend, Sumi? She’s moving to another town.\nM: I’m sorry to hear that. When is she going to move?\nW: Next Wednesday. I feel so sad.\nM: Don’t worry. You can still keep in touch." },
          { num: 5, type: "text", q: "다음을 듣고, 남자가 장미 축제에 대해 언급하지 않은 것을 고르시오.", options: ["장소", "날짜", "운영 시간", "입장료", "프로그램"], answer: 4, script: "M: Let me tell you about the rose festival at Center Park. It’ll be on May roses. And it’ll also have many interesting programs, like a magic performance." },
          { num: 6, type: "text", q: "대화를 듣고, 여자가 집을 떠난 시각을 고르시오.", options: ["3:00p.m.", "3:30p.m.", "4:00p.m.", "4:30p.m.", "5:00p.m."], answer: 2, script: "[Cellphonerings.]\nW: Hello, Hojin. Sorry, but I’ll be a little late.\nM: It’s already 4:30p.m. Where are you?\nW: I’m almost there. I’ll be there soon.\nM: Did you leave home late?\nW: No. I left home at 3:30p.m., but I took the wrong bus.\nM: Okay, then I’ll see you soon." },
          { num: 7, type: "text", q: "대화를 듣고, 남자의 장래 희망으로 가장 적절한 것을 고르시오.", options: ["화가", "모델", "정원사", "성악가", "건축가"], answer: 1, script: "M: Welcome to my house.\nW: Thank you. Oh, the sunflower picture is beautiful. Did you take it?\nM: Actually, I painted it.\nW: Wow, it looks like a photo! You’re really good at painting.\nM: Thanks. I want to be a painter like Van Gogh someday.\nW: I believe you will." },
          { num: 8, type: "text", q: "대화를 듣고, 여자의 심정으로 가장 적절한 것을 고르시오.", options: ["신남", "행복함", "수줍음", "자랑스러움", "걱정스러움"], answer: 5, script: "M: Stella, what’s wrong?\nW: David, my cat is sick. It couldn’t eat anything yesterday.\nM: How about today?\nW: No, nothing. I’m really worried.\nM: Oh, that’s too bad. Did you go see an animal doctor?\nW: Yes, but my cat’s still sick.\nM: Don’t worry too much. I’m sure it’ll be fine soon." },
          { num: 9, type: "text", q: "대화를 듣고, 여자가 대화 직후에 할 일로 가장 적절한 것을 고르시오.", options: ["병원 가기", "스트레칭하기", "다른 영화 찾기", "친구에게 전화하기", "휴대 전화 전원 끄기"], answer: 2, script: "W: Dad! My neck really hurts.\nM: Why?\nW: I don’t know. I was just watching movies on my cellphone.\nM: Oh, maybe you looked down too much.\nW: Ow! The pain is so strong.\nM: Then, you should try stretching your neck.\nW: Okay. I’ll do that now." },
          { num: 10, type: "text", q: "대화를 듣고, 무엇에 관한 내용인지 가장 적절한 것을 고르시오.", options: ["수업 시간표", "축제 일정표", "체험 학습 안내문", "동아리 모집 공고문", "미래 직업 포스터"], answer: 5, script: "W: What are those posters on the wall, Junghoon?\nM: Hi, Mia. We made the posters about future jobs during class.\nW: Wow, there will be a lot of new jobs in the future!\nM: Yes. And this is my group’s poster. It’s about a drone designer.\nW: It looks nice." },
          { num: 11, type: "text", q: "대화를 듣고, 두 사람이 함께 이용할 교통수단으로 가장 적절한 것을 고르시오.", options: ["기차", "택시", "버스", "자전거", "지하철"], answer: 3, script: "M: Hana, let’s go to the history museum tomorrow.\nW: Okay. Do you want to take the subway?\nM: Hmm... The museum is far from the subway station.\nW: Then, what about taking a bus? It stops near the museum.\nM: Good. We can meet at the bus stop at 8.\nW: Okay. See you then." },
          { num: 12, type: "text", q: "대화를 듣고, 남자가 야구장에 갈 수 없는 이유로 가장 적절한 것을 고르시오.", options: ["다리를 다쳐서", "숙제를 해야 해서", "야구 경기가 취소되어서", "표를 구하지 못해서", "할머니 댁을 방문해야 해서"], answer: 5, script: "M: Mom, can I go to the baseball stadium this Saturday?\nW: This Saturday? I’m afraid you can’t.\nM: Why not?\nW: We should go to your grandmother’s house for her birthday.\nM: Oh, is it this Saturday? I thought it was next Saturday.\nW: Why don’t you go to the stadium on another day?\nM: Okay." },
          { num: 13, type: "text", q: "대화를 듣고, 두 사람이 대화하는 장소로 가장 적절한 곳을 고르시오.", options: ["서점", "우체국", "옷가게", "미용실", "체육관"], answer: 4, script: "M: Hello. What can I do for you?\nW: I’d like to get a haircut.\nM: How short do you want it?\nW: I want to cut it about 5centimeters, so it’s just at my shoulder.\nM: Okay. Anything else?\nW: No, that’s all for today." },
          { num: 14, type: "text", q: "대화를 듣고, 병원의 위치로 가장 알맞은 곳을 고르시오.", options: ["①", "②", "③", "④", "⑤"], answer: 2, script: "W: Hi, Ted. What’s wrong?\nM: I don’t know. I’m not feeling very well. Is there a hospital around here?\nW: Yes, go straight two blocks and turn right on Pine Street.\nM: On Pine Street?\nW: Yes, it’ll be on your left. It’s next to the bank.\nM: Thank you." },
          { num: 15, type: "text", q: "대화를 듣고, 여자가 남자에게 부탁한 일로 가장 적절한 것을 고르시오.", options: ["화초 물 주기", "책 반납하기", "설거지하기", "숙제 도와주기", "거실 청소하기"], answer: 4, script: "W: Dad, I’m ready to check today’s to-do list.\nM: Okay. Did you water the plants?\nW: Yes. I also did the dishes after that.\nM: Good. What about your homework?\nW: No, I couldn’t do it. Can you help me with it?\nM: Sure. Let’s start right away." },
          { num: 16, type: "text", q: "대화를 듣고, 남자가 여자에게 제안한 것으로 가장 적절한 것을 고르시오.", options: ["풍선 불기", "수박 자르기", "초대장 만들기", "케이크 사기", "테이블 정리하기"], answer: 4, script: "M: Nancy, what other things do we need for the party?\nW: Something to drink and a dessert.\nM: Okay, I’ll bring some watermelon juice.\nW: Then, we’ll need a cake for dessert.\nM: What about buying one from the bakery?\nW: Yeah, that sounds good." },
          { num: 17, type: "text", q: "대화를 듣고, 여자가 겨울방학에 한 일로 가장 적절한 것을 고르시오.", options: ["스키 타기", "도자기 만들기", "축제 참가하기", "가족 여행 가기", "아기 모자 만들기"], answer: 5, script: "W: Jinho, how was your winter vacation?\nM: Fantastic! I went skiing with my family. What about you?\nW: I made baby hats for my little brother at home.\nM: Wow! How long did it take to make them?\nW: It took around two days for each hat." },
          { num: 18, type: "text", q: "대화를 듣고, 남자의 직업으로 가장 적절한 것을 고르시오.", options: ["경찰관", "소방관", "요리사", "미술 교사", "잡지 기자"], answer: 2, script: "W: Hello. I’m Mina, the student reporter. Thank you for this interview.\nM: It’s my pleasure.\nW: Would you tell me about your job?\nM: Sure. I save people from fires.\nW: Great! Could you show me your fire truck?\nM: Okay. Let’s go outside." },
          { num: 19, type: "dialogue", q: "W: Justin, what do you want to write for our science group report?", options: ["He’s fine.", "Sounds good.", "It’s cold now.", "Long time no see.", "How are you doing?"], answer: 2, script: "M: How about robots?\nW: That’s a good idea.\nM: Let’s write the first part of the report together.\nW: Good. How about tomorrow afternoon?\nM: Actually, I have a club meeting at 2. Let’s meet at 4.\nW: ________________________________________________" },
          { num: 20, type: "dialogue", q: "W: Paul, what do you want to eat for dinner?", options: ["I like winter.", "My hobby is singing.", "He wants to be a doctor.", "She has a stomachache.", "Let’s go to Min’s Restaurant."], answer: 5, script: "M: I want some noodles.\nW: What about some Vietnamese noodles?\nM: Vietnamese noodles? Are they good?\nW: Yes, you’ll love them just like me. Let’s go get some.\nM: Okay. Where can we go?\nW: ________________________________________________\nANN:" }
        ]
      },
      {
        id: "2020_m1_r2",
        title: "2020학년도 제2회",
        subtitle: "중1 영어듣기능력평가",
        date: "2020. 9. 8.",
        audioFile: "https://dfpmpbjhljsyypofpvfu.supabase.co/storage/v1/object/public/listening-audio/2020_m1_r2.m4a",
        youtubeUrl: "",
        questions: [
          { num: 1, type: "image", q: "다음을 듣고, ‘this’가 가리키는 것으로 가장 적절한 것을 고르시오.", options: ["images/2020_m1_r2/q1_1.jpg", "images/2020_m1_r2/q1_2.jpg", "images/2020_m1_r2/q1_3.jpg", "images/2020_m1_r2/q1_4.jpg", "images/2020_m1_r2/q1_5.jpg"], answer: 2, script: "W: This is usually long and thin. You can get this from wood. You can use this when you write something on paper. When you use this a lot, it becomes shorter. What is this?" },
          { num: 2, type: "image", q: "대화를 듣고, 여자가 구입할 마우스 패드로 가장 적절한 것을 고르시오.", options: ["images/2020_m1_r2/q2_1.jpg", "images/2020_m1_r2/q2_2.jpg", "images/2020_m1_r2/q2_3.jpg", "images/2020_m1_r2/q2_4.jpg", "images/2020_m1_r2/q2_5.jpg"], answer: 1, script: "M: Hello, may I help you?\nW: Hi. I’m looking for a mouse pad.\nM: How about this square one?\nW: It’s okay, but I like this round one better.\nM: I see. And the cat picture on it is very cute.\nW: Yes, I think so, too. I’ll take it." },
          { num: 3, type: "image", q: "다음을 듣고, 수요일 오후의 날씨로 가장 적절한 것을 고르시오.", options: ["images/2020_m1_r2/q3_1.jpg", "images/2020_m1_r2/q3_2.jpg", "images/2020_m1_r2/q3_3.jpg", "images/2020_m1_r2/q3_4.jpg", "images/2020_m1_r2/q3_5.jpg"], answer: 1, script: "W: Good morning! Here is the weather forecast for this week. We will have clear skies today on Monday, but it will be cloudy tomorrow. On\nWednesday, there will be more clouds in the morning, and it will rain all afternoon." },
          { num: 4, type: "text", q: "대화를 듣고, 여자가 한 마지막 말의 의도로 가장 적절한 것을 고르시오.", options: ["격려", "동의", "거절", "부탁", "감사"], answer: 3, script: "M: Guess what? A new action movie just came out!\nW: Really? Did you see it?\nM: Not yet. Let’s go watch it together.\nW: Sounds good. When do you want to go see it?\nM: What about tomorrow afternoon?\nW: Sorry, but I can’t. I have to go to my uncle’s wedding." },
          { num: 5, type: "text", q: "다음을 듣고, 남자가 할 봉사활동에 대해 언급하지 않은 것을 고르시오.", options: ["장소", "요일", "참가자", "활동 내용", "신청 방법"], answer: 5, script: "M: Let me tell you about my plans for volunteer work. I’ll visit the library in my neighborhood. I’ll do the volunteer work every Saturday. My friend,\nSooho and I will go together. We’ll read books to the children and clean the library." },
          { num: 6, type: "text", q: "대화를 듣고, 현재의 시각을 고르시오.", options: ["7:00p.m.", "7:30p.m.", "8:00p.m.", "8:30p.m.", "9:00p.m."], answer: 2, script: "W: Tom, what are you looking at?\nM: I’m searching for the time for a TV show.\nW: What show?\nM: Middle School Quiz. Oh, here it is! It’ll be on at 8 tonight.\nW: Let’s watch it together. It’s 7:30 now.\nM: Great! We only need to wait 30minutes." },
          { num: 7, type: "text", q: "대화를 듣고, 남자의 장래 희망으로 가장 적절한 것을 고르시오.", options: ["가수", "발명가", "마술사", "영화감독", "스포츠 기자"], answer: 4, script: "M: Kate, did you see the movie, BigPlan?\nW: Not yet. What’s it about?\nM: It’s about future life.\nW: You really love to watch movies.\nM: Yes, I want to be a movie director someday.\nW: I’m sure your dream will come true." },
          { num: 8, type: "text", q: "대화를 듣고, 여자의 심정으로 가장 적절한 것을 고르시오.", options: ["happy", "bored", "proud", "relaxed", "nervous"], answer: 5, script: "M: Somi, are you ready for the school festival audition today?\nW: Yes, but I’m afraid I won’t remember all the words to the song.\nM: You practiced a lot, so it’ll be okay.\nW: Right, but my face always turns red when I’m on stage.\nM: You’ll do well.\nW: But my heart is beating so fast!" },
          { num: 9, type: "text", q: "대화를 듣고, 여자가 대화 직후에 할 일로 가장 적절한 것을 고르시오.", options: ["저녁 먹기", "케이블카 타기", "여행 짐 챙기기", "식당 검색하기", "기차표 예매하기"], answer: 4, script: "M: Cindy, are you ready for our family trip to Yeosu?\nW: Yes, Dad. It’s finally this Saturday!\nM: Right. We’re going to ride a cable car.\nW: Great! What will we eat there?\nM: Well, can you search for some good restaurants on the Internet?\nW: Sure! I’ll do it now." },
          { num: 10, type: "text", q: "대화를 듣고, 무엇에 관한 내용인지 가장 적절한 것을 고르시오.", options: ["인터넷 사용 예절", "화재 대피 요령", "자전거 안전 수칙", "무선 이어폰 종류", "안전모 착용 방법"], answer: 3, script: "W: Kevin, here are some bicycle safety rules.\nM: What are they, Mom?\nW: First, riders should always wear a helmet.\nM: I already know that. What else?\nW: Also, don’t use earphones when you ride a bicycle.\nM: Why not?\nW: You can’t hear the sounds around you. It’s dangerous.\nM: Okay. I’ll follow the rules." },
          { num: 11, type: "text", q: "대화를 듣고, 남자가 이용할 교통수단으로 가장 적절한 것을 고르시오.", options: ["기차", "자동차", "지하철", "자전거", "비행기"], answer: 3, script: "W: Steve, how will you get to the amusement park tomorrow?\nM: I’m not sure, but my mom could take me there by car. How about you?\nW: Jessie and I will take the subway.\nM: Really? Can I join you?\nW: Sure. Meet us at the subway station at 9.\nM: Okay. See you then." },
          { num: 12, type: "text", q: "대화를 듣고, 여자가 영어 캠프에 가지 못하는 이유로 가장 적절한 것을", options: ["팔을 치료해야 해서", "동생을 돌봐야 해서", "콘서트에 가야 해서", "가족 여행을 가야 해서", "다른 캠프에 가야 해서"], answer: 4, script: "M: Sujin, are you going to join the English camp?\nW: I’d like to, but I can’t.\nM: Really? Why not?\nW: My family will travel to Gyeongju during the winter vacation.\nM: That sounds wonderful!\nW: Yes, I’m so excited! I hope you have fun at the camp.\nM: I will. Thanks." },
          { num: 13, type: "text", q: "대화를 듣고, 두 사람이 대화하는 장소로 가장 적절한 곳을 고르시오.", options: ["식당", "동물원", "사진관", "약국", "과일 가게"], answer: 2, script: "M: Look at the monkeys over there.\nW: They’re cute!\nM: I want to touch them.\nW: No, Jason! It’s dangerous.\nM: Can I give them some bananas?\nW: No. The sign there says, “NO FOOD TO ANIMALS.”\nM: I see. Then, let’s go see the tigers.\nW: Okay. I want to take some pictures of them." },
          { num: 14, type: "text", q: "대화를 듣고, 두 사람이 찾고 있는 안경의 위치로 가장 적절한 것을 고르시오.", options: ["①", "②", "③", "④", "⑤"], answer: 3, script: "W: Dad, let’s watch this movie.\nM: Okay. Wait! I need my glasses.\nW: I saw them on the bookshelf this afternoon.\nM: They’re not there. Can you look on the sofa?\nW: They aren’t here. Oh! Here they are under the sofa.\nM: Glad you found them. Thanks." },
          { num: 15, type: "text", q: "대화를 듣고, 여자가 남자에게 부탁한 일로 가장 적절한 것을 고르시오.", options: ["고기 굽기", "야채 씻기", "텐트 설치하기", "캠핑장 청소하기", "할아버지 찾으러 가기"], answer: 5, script: "W: Matthew, where’s your grandpa?\nM: He went to look around the camping site, Mom.\nW: It’s lunch time. Let’s have some barbecue.\nM: That sounds delicious! I’ll wash the vegetables.\nW: I already washed them. Instead, can you go find your grandpa?\nM: No problem. I’ll do that." },
          { num: 16, type: "text", q: "대화를 듣고, 남자가 여자에게 제안한 것으로 가장 적절한 것을 고르시오.", options: ["일찍 출발하기", "숙소 알아보기", "여행 가방 싸기", "기차역까지 태워 주기", "온라인으로 표 구매하기"], answer: 5, script: "M: Honey, are you going to leave soon?\nW: Yes, I’m packing my bag now.\nM: Did you buy a ticket for Daegu?\nW: Not yet. I’ll do that at the station.\nM: Why don’t you buy it online? You can save some time.\nW: Okay, I will. That’s a good idea." },
          { num: 17, type: "text", q: "대화를 듣고, 여자가 만들 물건으로 가장 적절한 것을 고르시오.", options: ["양말", "가방", "상자", "스카프", "앞치마"], answer: 4, script: "W: Minho, your T-shirt looks a little old.\nM: I think so, too. Should I put it in the recycling box, Mom?\nW: No, I can make something with it.\nM: Cool! What are you going to make?\nW: Hmm... I already have some bags. So, I’ll make a scarf.\nM: Great idea!" },
          { num: 18, type: "text", q: "대화를 듣고, 남자의 직업으로 가장 적절한 것을 고르시오.", options: ["작가", "수의사", "요리사", "택시 기사", "게임 개발자"], answer: 1, script: "W: Nice to meet you, Mr. Park. Could you sign this book for my son?\nM: Sure. What’s his name?\nW: His name is Juno, and he’s 10. He loves your book.\nM: Thank you. I actually wrote the book for children around his age.\nW: I liked it, too. Good stories can touch everyone." },
          { num: 19, type: "dialogue", q: "M: Honey, which restaurant is best for Joon’s birthday?", options: ["Yes, you did.", "Okay, let’s go there.", "Glad to meet you.", "Sorry for being late.", "She had a great time."], answer: 2, script: "W: Joon likes spicy food, right?\nM: Yeah. He really loves it.\nW: Then, what about a Mexican restaurant?\nM: That sounds good. I heard there’s one in Ally Shopping Mall.\nW: Then, why don’t we go there for Joon’s birthday?\nM: ________________________________________________" },
          { num: 20, type: "dialogue", q: "W: Eric, I have some good news.", options: ["Linda will join us.", "She went to Busan.", "I already read the book.", "I am interested in cooking.", "Why don’t we go see a movie?"], answer: 1, script: "M: What is it?\nW: I can go to the movies with you tomorrow.\nM: Great! But, you said you were going to visit your cousin.\nW: I was, but only my mom will visit her.\nM: Then, come to Star Cinema by 10.\nW: Okay. Who else will come?\nM: ________________________________________________\nANN:" }
        ]
      },
      {
        id: "2021_m1_r1",
        title: "2021학년도 제1회",
        subtitle: "중1 영어듣기능력평가",
        date: "2021. 4. 6.",
        audioFile: "https://dfpmpbjhljsyypofpvfu.supabase.co/storage/v1/object/public/listening-audio/2021_m1_r1.m4a",
        youtubeUrl: "",
        questions: [
          { num: 1, type: "image", q: "다음을 듣고, ‘I’가 무엇인지 가장 적절한 것을 고르시오.", options: ["images/2021_m1_r1/q1_1.jpg", "images/2021_m1_r1/q1_2.jpg", "images/2021_m1_r1/q1_3.jpg", "images/2021_m1_r1/q1_4.jpg", "images/2021_m1_r1/q1_5.jpg"], answer: 2, script: "W: I have two short legs and two wings. I can swim, but I cannot fly. I am black and white. I usually live in cold weather. What am I?" },
          { num: 2, type: "image", q: "대화를 듣고, 남자가 구입할 우산으로 가장 적절한 것을 고르시오.", options: ["images/2021_m1_r1/q2_1.jpg", "images/2021_m1_r1/q2_2.jpg", "images/2021_m1_r1/q2_3.jpg", "images/2021_m1_r1/q2_4.jpg", "images/2021_m1_r1/q2_5.jpg"], answer: 3, script: "W: Can I help you, sir?\nM: Yes. I’m looking for an umbrella for my daughter.\nW: Okay. We have this one with stars.\nM: Hmm... Do you have any others?\nW: Yes. This one with hearts on it.\nM: Oh, good. She loves heart shapes.\nW: Great! Sounds like she’d like it.\nM: Right. I’ll take it." },
          { num: 3, type: "image", q: "다음을 듣고, 내일의 날씨로 가장 적절한 것을 고르시오.", options: ["images/2021_m1_r1/q3_1.jpg", "images/2021_m1_r1/q3_2.jpg", "images/2021_m1_r1/q3_3.jpg", "images/2021_m1_r1/q3_4.jpg", "images/2021_m1_r1/q3_5.jpg"], answer: 1, script: "M: Good morning, everybody! This is the weather report. It’s raining outside now. So, don’t forget your umbrella. The rain will stop tonight.\nTomorrow, it’ll be sunny and a little bit hot. It’ll be almost like summer." },
          { num: 4, type: "text", q: "대화를 듣고, 여자의 마지막 말의 의도로 가장 적절한 것을 고르시오.", options: ["충고", "사과", "부탁", "축하", "거절"], answer: 3, script: "M: Tracy, you look unhappy.\nW: Oh, Dad. I have a big problem.\nM: What is it?\nW: My cellphone doesn’t turn on.\nM: Did you check the battery?\nW: Yes, I did. Can you please take a look at it?" },
          { num: 5, type: "text", q: "다음을 듣고, 남자가 방과 후 미술 수업에 대해 언급하지 않은 것을 고르시오.", options: ["교사 이름", "수업 시간", "준비물", "교실 위치", "수강료"], answer: 5, script: "M: Hello, students. This is your art teacher, Joe Smith. I opened a new after-school art class. It’ll start next week. It’s from 3p.m. to 5p.m. every\nWednesday. You must bring water colors and brushes. The classroom is room 302 on the third floor. Hope to see you there!" },
          { num: 6, type: "text", q: "대화를 듣고, 두 사람이 이야기를 나누는 현재 시각을 고르시오.", options: ["4:00p.m.", "4:30p.m.", "5:00p.m.", "5:30p.m.", "6:00p.m."], answer: 2, script: "M: Kelly, did you watch Shoot Together on TV last week?\nW: Yes, I did. I love TV shows about basketball.\nM: Me, too. I can’t wait to see the next episode.\nW: It’s tomorrow, right?\nM: No, it’s today at 5p.m.\nW: Really? It starts in 30 minutes!\nM: You mean it’s 4:30p.m. now? We have to hurry up!" },
          { num: 7, type: "text", q: "대화를 듣고, 남자의 장래 희망으로 가장 적절한 것을 고르시오.", options: ["신발 디자이너", "패션 모델", "영화 배우", "아나운서", "만화가"], answer: 1, script: "W: Louis, what are you drawing?\nM: Look, Genie. It’s a design for a pair of shoes.\nW: It is nice! Are you interested in shoes?\nM: Yes, I want to become a shoe designer in the future.\nW: You have enough talent for it.\nM: Thanks, Genie." },
          { num: 8, type: "text", q: "대화를 듣고, 여자의 심정으로 가장 적절한 것을 고르시오.", options: ["슬픔", "지루함", "수줍음", "자랑스러움", "실망스러움"], answer: 4, script: "M: Sooyoung, what are you doing?\nW: I’m looking at a picture of my little brother. My parents just sent it to me.\nM: What is he wearing around his neck?\nW: It’s a gold medal.\nM: How did he get it?\nW: He won it in a drawing contest. I’m so proud of him." },
          { num: 9, type: "text", q: "대화를 듣고, 여자가 대화 직후에 할 일로 가장 적절한 것을 고르시오.", options: ["휴대폰 수리하기", "체육관 방문하기", "온라인 수업 듣기", "학교에 전화하기", "새로운 컴퓨터 사기"], answer: 4, script: "M: Sophie, what are you going to do this weekend?\nW: I’m going to go shopping for a new tablet PC with my parents.\nM: What’s wrong with yours?\nW: It stopped working. I need one to take online classes.\nM: You can borrow a tablet PC from school.\nW: Really? I’ll call the school and ask about it now. Thanks." },
          { num: 10, type: "text", q: "대화를 듣고, 무엇에 관한 내용인지 가장 적절한 것을 고르시오.", options: ["학교 축제", "등교 날짜", "급식 만족도", "방학 숙제", "교복 디자인"], answer: 5, script: "W: Did you see the new posting on the school website?\nM: Which one are you talking about?\nW: The one about the new school uniform designs.\nM: Yes, I saw it. There are three designs. Which one do you like the most?\nW: I like the number three. I think it’s fashionable.\nM: Me, too. It also looks really comfortable." },
          { num: 11, type: "text", q: "대화를 듣고, 두 사람이 함께 이용할 교통수단으로 가장 적절한 것을 고르", options: ["택시", "기차", "버스", "지하철", "자전거"], answer: 3, script: "W: Jihoon, how should we go to Jeonju?\nM: Let me check on my phone. [Pause] Look! We can take a train or a bus.\nW: Which one do you want to take?\nM: I’d like to take a train. It’s faster.\nW: But the bus is cheaper.\nM: Good point. Let’s ride the bus, then.\nW: Okay. Let’s do that." },
          { num: 12, type: "text", q: "대화를 듣고, 콘서트 일정이 변경된 이유로 가장 적절한 것을 고르시오.", options: ["음향시설을 수리하기 위해서", "공연 장소를 찾지 못해서", "티켓 예매율이 저조해서", "기상 상황이 악화되어서", "가수가 다리를 다쳐서"], answer: 5, script: "M: Victoria, you’re going to the K-pop concert tonight, right?\nW: I was going to, but the date changed.\nM: Really? I’m sorry to hear that. What happened?\nW: The singer broke his leg during practice.\nM: That’s too bad. I hope his leg gets better soon.\nW: I hope so, too." },
          { num: 13, type: "text", q: "대화를 듣고, 두 사람이 대화하는 장소로 가장 적절한 곳을 고르시오.", options: ["병원", "동물원", "옷가게", "우체국", "음식점"], answer: 4, script: "W: Good morning. How can I help you?\nM: Hi. I need to send this package to Sejong.\nW: What’s in it?\nM: Books.\nW: Write the name and address right here on the box.\nM: Okay. [Pause] When will it arrive?\nW: Let me see. [Pause] Within three days." },
          { num: 14, type: "text", q: "대화를 듣고, 경찰서의 위치로 가장 알맞은 곳을 고르시오.", options: ["①", "②", "③", "④", "⑤"], answer: 1, script: "M: Excuse me. Is there a police station nearby?\nW: Yes, there is one close to here.\nM: Good! Can you tell me how to get there?\nW: Sure. Go straight two blocks and turn left on Union Street.\nM: On Union Street?\nW: Yes, it’ll be on your right. It’s between the fire station and the movie theater.\nM: Thanks." },
          { num: 15, type: "text", q: "대화를 듣고, 여자가 남자에게 부탁한 일로 가장 적절한 것을 고르시오.", options: ["표 예매하기", "선물 구입하기", "거실 청소하기", "음식 준비하기", "친구 초대하기"], answer: 2, script: "M: Honey, Mike’s birthday is next week.\nW: Right. We should buy a birthday present for him.\nM: What about a baseball cap? He’s really into baseball.\nW: He already has a few. How about a baseball bat?\nM: That’s a good idea. He’ll love it.\nW: So, can you buy it for him?\nM: Of course!" },
          { num: 16, type: "text", q: "대화를 듣고, 여자가 남자에게 제안한 것으로 가장 적절한 것을 고르시오.", options: ["스트레칭하기", "경기 관람하기", "유니폼 주문하기", "축구공 구입하기", "동아리 가입하기"], answer: 5, script: "M: Wow! Hana, you’re really good at soccer.\nW: Thank you for saying that.\nM: Where did you learn to play?\nW: In the school soccer club.\nM: I want to learn how to play.\nW: Then, how about joining the club?\nM: That sounds great!" },
          { num: 17, type: "text", q: "대화를 듣고, 여자가 지난 주말에 한 일을 고르시오.", options: ["꽃 심기", "등산하기", "독서하기", "분리수거하기", "봉사활동하기"], answer: 2, script: "W: Jake, what did you do last weekend?\nM: I helped my grandmother to plant flowers. What about you?\nW: I climbed Mt. Seorak with my family.\nM: Wow, that’s cool! Didn’t you get tired?\nW: A little bit. But, it was really fun.\nM: I want to go there with my family sometime." },
          { num: 18, type: "text", q: "대화를 듣고, 남자의 직업으로 가장 적절한 것을 고르시오.", options: ["요가 강사", "택시 기사", "소방관", "사진사", "요리사"], answer: 4, script: "M: May I help you?\nW: Yes. I want to get a photo of myself.\nM: Okay. I can help you with that. What’s it for?\nW: It’s for my student ID card.\nM: Alright. Come over here and have a seat, please. [Pause] Are you ready?\nW: Yes, I am.\nM: Good. One, two, three. Smile!" },
          { num: 19, type: "dialogue", q: "M: Are you ready to order?", options: ["He likes running.", "It’s sunny outside.", "An apple juice, please.", "Long time no see.", "The chef is from Italy."], answer: 3, script: "W: I’m still trying to decide.\nM: Sure. Take your time.\nW: Could you please tell me the specials?\nM: Yes. The specials for today are the beefsteak and the tomato pasta.\nW: Hmm... I’ll have the beefsteak.\nM: Okay. Anything else?\nW: ________________________________________________" },
          { num: 20, type: "dialogue", q: "M: Ellie, we’re moving to a new house next month.", options: ["I want blue.", "It looks delicious.", "It takes 3 hours.", "You are not alone.", "There’s a bus stop nearby."], answer: 1, script: "W: Really? Will I have my own room, Dad?\nM: Yes.\nW: Awesome! And can I get a new chair for my room?\nM: Sure. We’ll buy it after we move in.\nW: Thanks, Dad. What about my room’s wallpaper? Can I choose the color?\nM: Sure. What color do you want?\nW: ________________________________________________\nANN:" }
        ]
      },
      {
        id: "2021_m1_r2",
        title: "2021학년도 제2회",
        subtitle: "중1 영어듣기능력평가",
        date: "2021. 9. 7.",
        audioFile: "https://dfpmpbjhljsyypofpvfu.supabase.co/storage/v1/object/public/listening-audio/2021_m1_r2.m4a",
        youtubeUrl: "",
        questions: [
          { num: 1, type: "image", q: "다음을 듣고, ‘this’가 가리키는 것으로 가장 적절한 것을 고르시오.", options: ["images/2021_m1_r2/q1_1.jpg", "images/2021_m1_r2/q1_2.jpg", "images/2021_m1_r2/q1_3.jpg", "images/2021_m1_r2/q1_4.jpg", "images/2021_m1_r2/q1_5.jpg"], answer: 5, script: "M: You can see this in a kitchen. It has one or more doors. You put foods and drinks in it. It keeps foods fresh and drinks cool. What is this?" },
          { num: 2, type: "image", q: "대화를 듣고, 여자가 구입할 꽃병으로 가장 적절한 것을 고르시오.", options: ["images/2021_m1_r2/q2_1.jpg", "images/2021_m1_r2/q2_2.jpg", "images/2021_m1_r2/q2_3.jpg", "images/2021_m1_r2/q2_4.jpg", "images/2021_m1_r2/q2_5.jpg"], answer: 4, script: "M: May I help you?\nW: Yes, I’m looking for a vase for my mom.\nM: What about this one with a big star on it? It’s our most popular one.\nW: I like the star, but I think it’s too big.\nM: Then, you may like this one. It has many small stars on it.\nW: It’s great! I’ll take it." },
          { num: 3, type: "image", q: "다음을 듣고, 내일의 날씨로 가장 적절한 것을 고르시오.", options: ["images/2021_m1_r2/q3_1.jpg", "images/2021_m1_r2/q3_2.jpg", "images/2021_m1_r2/q3_3.jpg", "images/2021_m1_r2/q3_4.jpg", "images/2021_m1_r2/q3_5.jpg"], answer: 2, script: "W: Good morning. This is the daily weather report. Yesterday, there were no clouds, with sunny and clear skies. But today, it’ll be cloudy and windy.\nFrom tomorrow, it’ll be rainy for the rest of the week. Have a great day!" },
          { num: 4, type: "text", q: "대화를 듣고, 남자가 한 마지막 말의 의도로 가장 적절한 것을 고르시오.", options: ["위로", "사과", "축하", "칭찬", "제안"], answer: 5, script: "W: James, what are you going to do this weekend?\nM: Hi, Sarah. I am going to the City Museum to do our history homework.\nW: Oh, I forgot about that.\nM: You have to do it by Monday.\nW: Really? There’s not much time. Can I go with you?\nM: Sure. Let’s go and do the homework together." },
          { num: 5, type: "text", q: "다음을 듣고, 남자가 앱에 대해 언급하지 않은 것을 고르시오.", options: ["이름", "제작자", "평점", "기능", "가격"], answer: 3, script: "M: Hello. I’m Steve Gates. I’d like to tell you about a new music app. Its name is Music Life. I made it with my friends. You can listen to classical music with this app. You can download the app for free from the application market now." },
          { num: 6, type: "text", q: "대화를 듣고, 두 사람이 만날 시각을 고르시오.", options: ["1:30p.m.", "2:00p.m.", "2:30p.m.", "3:00p.m.", "3:30p.m."], answer: 1, script: "[Cellphone rings.]\nM: Hey, Sohee! What’s up?\nW: Hey, Jimin! I’m calling to see when we should meet today.\nM: The concert begins at 3p.m., so what about 1:30p.m.?\nW: It’s a bit early, but I’m okay with that.\nM: Okay, then let’s meet at 1:30p.m. in front of the ticket office.\nW: Alright. See you then." },
          { num: 7, type: "text", q: "대화를 듣고, 여자의 장래 희망으로 가장 적절한 것을 고르시오.", options: ["발레리나", "아나운서", "사진작가", "기타리스트", "패션 디자이너"], answer: 4, script: "M: Subin, why do you have this picture on your desk?\nW: Because the woman in the picture is my role model.\nM: Cool. Who is she?\nW: She is my favorite guitarist, Lisa Wilson.\nM: Wow! So, do you want to be like her in the future?\nW: Yes. I want to be an amazing guitarist someday.\nM: Great!" },
          { num: 8, type: "text", q: "대화를 듣고, 남자의 심정으로 가장 적절한 것을 고르시오.", options: ["shy", "bored", "angry", "happy", "nervous"], answer: 4, script: "W: Look, Jiwon! The sun is coming up!\nM: It’s beautiful! Happy new year, Mom!\nW: Happy new year! How do you feel?\nM: I feel really good.\nW: That’s great. Did you make a wish?\nM: Yes. I made a wish that our family will always be happy." },
          { num: 9, type: "text", q: "대화를 듣고, 남자가 대화 직후에 할 일로 가장 적절한 것을 고르시오.", options: ["세차하기", "마트 방문하기", "옷장 정리하기", "영화 예매하기", "핸드크림 가져오기"], answer: 5, script: "W: Dad, I’m looking for the hand cream.\nM: Oh! Your hands are dry?\nW: Yes. But, I can’t find it in the bathroom.\nM: Oh, yeah. I put the hand cream in the car.\nW: Really? I need to use it.\nM: I’ll go get it from the car now.\nW: Thank you, Dad!" },
          { num: 10, type: "text", q: "대화를 듣고, 무엇에 관한 내용인지 가장 적절한 것을 고르시오.", options: ["설문지 작성", "영화제 방문", "캠페인 참여", "도시락 준비", "봉사활동 신청"], answer: 2, script: "W: Minsoo, are you going to the Korea Movie Festival?\nM: Of course. I love movies.\nW: Me, too. There are going to be good movies there.\nM: Why don’t we go there together?\nW: Sounds great! What about tomorrow?\nM: That works. How about meeting in front of the Grand Theatre?\nW: Okay, see you there." },
          { num: 11, type: "text", q: "대화를 듣고, 두 사람이 함께 이용할 교통수단으로 가장 적절한 것을 고르", options: ["택시", "버스", "기차", "지하철", "자전거"], answer: 5, script: "[Cellphone rings.]\nM: Hey, Jina!\nW: Hey, Seho! Do you want to go to Green Park?\nM: Sure. How do we get there?\nW: We can just take the bus.\nM: But, it will be very crowded on the bus now.\nW: Right. Then, what about riding bikes?\nM: Sounds good. We can also get some fresh air.\nW: Great. Let’s go now!" },
          { num: 12, type: "text", q: "대화를 듣고, 여자에게 매트가 필요한 이유로 가장 적절한 것을 고르시오.", options: ["짐을 옮기기 위해서", "소풍을 가기 위해서", "방을 꾸미기 위해서", "물건을 올려두기 위해서", "집에서 운동하기 위해서"], answer: 5, script: "M: Somi, do you need anything from the supermarket?\nW: Yes, Dad. I need a mat.\nM: Okay. What for?\nW: As you know, I just started exercising at home last week. So, I want to have one.\nM: I see. I’ll buy one for you.\nW: Thank you." },
          { num: 13, type: "text", q: "대화를 듣고, 두 사람이 대화하는 장소로 가장 적절한 곳을 고르시오.", options: ["도서관", "안경점", "영화관", "미용실", "우체국"], answer: 2, script: "M: Have a seat here. [Pause] First, cover your right eye. Can you read this?\nW: Five, two, three.\nM: Good. What about this?\nW: Eight and... I can’t see the next one.\nM: Alright. Now cover your left eye and read this.\nW: Seven, nine, and... [Pause] I’m not sure.\nM: Okay. Now look around and choose the glass frames." },
          { num: 14, type: "text", q: "대화를 듣고, 여자가 찾는 열쇠의 위치로 가장 알맞은 곳을 고르시오.", options: ["①", "②", "③", "④", "⑤"], answer: 3, script: "W: Hey, Jinho. Can you get my key in the kitchen?\nM: Okay, Mom. Where did you put it?\nW: Maybe on the microwave?\nM: No, it’s not there.\nW: Then, look on the table.\nM: Let me see. Oh, I found it. It’s under the table!" },
          { num: 15, type: "text", q: "대화를 듣고, 남자가 여자에게 부탁한 일로 가장 적절한 것을 고르시오.", options: ["보고서 출력하기", "프린터 수리하기", "과학 노트 빌려주기", "도서관에 책 반납하기", "선생님께 이메일 보내기"], answer: 1, script: "[Cellphone rings.]\nM: Hello, Jessie.\nW: Hi, Daniel. What’s up?\nM: My printer isn’t working. Can you print out my science report for me?\nW: Sure. Just email me your file.\nM: Okay, just a second. [Typing sound] I sent it to you.\nW: Let me check. [Pause] I got it.\nM: Thanks for your help." },
          { num: 16, type: "text", q: "대화를 듣고, 여자가 남자에게 제안한 것으로 가장 적절한 것을 고르시오.", options: ["병원 가기", "천천히 먹기", "친구 초대하기", "식사 전 손 씻기", "규칙적으로 운동하기"], answer: 1, script: "W: Jason, are you okay? You look sick.\nM: Mom, I have a stomachache.\nW: But, you were fine at lunch.\nM: I know. This pain started right after lunch.\nW: Maybe you ate too fast?\nM: No, I ate slowly. And, I think I have a fever.\nW: Then, let’s go see a doctor right now.\nM: Okay." },
          { num: 17, type: "text", q: "대화를 듣고, 두 사람이 오늘 오후에 할 일로 가장 적절한 것을 고르시오.", options: ["공부하기", "산책하기", "배드민턴 치기", "보드게임 하기", "TV 시청하기"], answer: 4, script: "[Cellphone rings.]\nW: Hey, Brian, what are you doing?\nM: Nothing much. What about you?\nW: Just watching TV.\nM: Do you want to go play badminton this afternoon?\nW: That’s a good idea, but it just started raining.\nM: Really? I didn’t know that. I guess we can’t play badminton.\nW: Then, how about playing board games at my house?\nM: Sounds good." },
          { num: 18, type: "text", q: "대화를 듣고, 여자의 직업으로 가장 적절한 것을 고르시오.", options: ["서예가", "경찰관", "웹툰 작가", "테니스 선수", "비행기 조종사"], answer: 3, script: "M: Naomi, how was the event with your fans?\nW: Fantastic. They were excited about my new webtoons.\nM: That’s wonderful! You worked so hard on this series.\nW: I know. I hope my fans will love reading it.\nM: They will. They’re really going to love your new drawing style.\nW: I hope so." },
          { num: 19, type: "dialogue", q: "M: Minju, what are you going to do this weekend?", options: ["No, it isn’t.", "Sure, why not?", "She likes singing.", "I think it’s too small.", "What do you do for fun?"], answer: 2, script: "W: I don’t have any plans yet. What about you?\nM: I’m going to volunteer at a nursing home. I do it every Sunday.\nW: What do you do there?\nM: I usually read newspapers to the elderly people.\nW: Oh, that’s nice! Can I go with you?\nM: ________________________________________________" },
          { num: 20, type: "dialogue", q: "W: Oh, I lost my worksheet for math class.", options: ["How about 5 o’clock?", "I met them yesterday.", "It’s the big green one.", "He is watching a movie.", "She was my homeroom teacher."], answer: 3, script: "M: You can copy mine. Let’s use the copy machine right over there.\nW: Do you know how to use it?\nM: It’s easy. Open the cover and put the paper on the glass.\nW: Alright, and then?\nM: Close the cover and push the start button.\nW: Which one is the start button?\nM: ________________________________________________\nANN:" }
        ]
      },
      {
        id: "2022_m1_r1",
        title: "2022학년도 제1회",
        subtitle: "중1 영어듣기능력평가",
        date: "2022. 4. 5.",
        audioFile: "https://dfpmpbjhljsyypofpvfu.supabase.co/storage/v1/object/public/listening-audio/2022_m1_r1.m4a",
        youtubeUrl: "",
        questions: [
          { num: 1, type: "image", q: "다음을 듣고, ‘I’가 무엇인지 가장 적절한 것을 고르시오.", options: ["images/2022_m1_r1/q1_1.jpg", "images/2022_m1_r1/q1_2.jpg", "images/2022_m1_r1/q1_3.jpg", "images/2022_m1_r1/q1_4.jpg", "images/2022_m1_r1/q1_5.jpg"], answer: 2, script: "W: I have four legs. My eyes are very big. I usually have wet skin. I live both in water and on land. I can jump very high. What am I?" },
          { num: 2, type: "image", q: "대화를 듣고, 여자가 구입할 선물 상자로 가장 적절한 것을 고르시오.", options: ["images/2022_m1_r1/q2_1.jpg", "images/2022_m1_r1/q2_2.jpg", "images/2022_m1_r1/q2_3.jpg", "images/2022_m1_r1/q2_4.jpg", "images/2022_m1_r1/q2_5.jpg"], answer: 4, script: "W: Hello, I’m looking for a gift box.\nM: We have square ones and round ones.\nW: I like round ones more.\nM: Okay, how about this striped box?\nW: Well... Can you show me another one?\nM: We also have this round one with stars on it.\nW: I like stars. I’ll take it." },
          { num: 3, type: "image", q: "다음을 듣고, 오늘 오후의 날씨로 가장 적절한 것을 고르시오.", options: ["images/2022_m1_r1/q3_1.jpg", "images/2022_m1_r1/q3_2.jpg", "images/2022_m1_r1/q3_3.jpg", "images/2022_m1_r1/q3_4.jpg", "images/2022_m1_r1/q3_5.jpg"], answer: 1, script: "W: Good morning. Here’s the weather news. We have clear blue skies now.\nHowever, we will have rain this afternoon. The rain will continue until tomorrow morning. When you go out in the afternoon, take an umbrella with you." },
          { num: 4, type: "text", q: "대화를 듣고, 남자가 한 마지막 말의 의도로 가장 적절한 것을 고르시오.", options: ["항의", "거절", "축하", "위로", "허락"], answer: 4, script: "[Cellphonerings.]\nW: Hey, what’s up?\nM: Hi. Do you want to play tennis together?\nW: I’d love to, but I can’t.\nM: Why not?\nW: My mom is sick. So, I should take care of her.\nM: I’m sorry to hear that. I hope she feels better soon." },
          { num: 5, type: "text", q: "다음을 듣고, 여자가 선생님에 대해 언급하지 않은 것을 고르시오.", options: ["이름", "경력", "과목", "취미", "성격"], answer: 2, script: "W: Hi, class. Let me introduce my favorite teacher to you. Her name is Subin\nShin. She teaches history. I like her lessons very much. Her hobby is swimming. Many students like her because she is kind and gentle." },
          { num: 6, type: "text", q: "대화를 듣고, 두 사람이 만날 시각을 고르시오.", options: ["1:00p.m.", "1:30p.m.", "2:00p.m.", "2:30p.m.", "3:00p.m."], answer: 3, script: "M: Hi, Susan. There is a free cooking class this afternoon.\nW: Really? Why don’t we go together?\nM: Sounds good. It starts at 3p.m.\nW: Then, I’ll come to your house at 2:30.\nM: We’ll be late. What about 2?\nW: 2 o’clock? Okay. I’ll see you then." },
