          { num: 7, type: "text", q: "대화를 듣고, 남자의 장래 희망으로 가장 적절한 것을 고르시오.", options: ["농부", "배우", "요리사", "성악가", "건축가"], answer: 1, script: "M: Emily, would you like some tomatoes?\nW: I’d love some. They look fresh.\nM: They are. My dad grew them.\nW: Really? He’s good at growing vegetables.\nM: Yes. He’s a farmer. And I want to be a farmer like him.\nW: I believe you can be.\nM: Thanks. I’ll have my own farm someday." },
          { num: 8, type: "text", q: "대화를 듣고, 여자의 심정으로 가장 적절한 것을 고르시오.", options: ["지루함", "수줍음", "슬픔", "기쁨", "화남"], answer: 4, script: "M: Maria, is this your cellphone?\nW: Oh, that’s mine! I was looking for it everywhere.\nM: I knew it was yours!\nW: I’m so glad you found it. Where was it?\nM: It was in the playground next to the bench.\nW: Thank you! I’m very happy now." },
          { num: 9, type: "text", q: "대화를 듣고, 남자가 대화 직후에 할 일로 가장 적절한 것을 고르시오.", options: ["과제 제출하기", "선생님 찾아가기", "온라인 강의 듣기", "친구에게 전화하기", "그룹 채팅방 만들기"], answer: 5, script: "W: Minho, we should talk about our group project.\nM: But John is not here today.\nW: Then how can we choose a topic?\nM: Let’s make a group chat room online.\nW: Sounds great! Then, John can also talk with us.\nM: Right. I’ll make a group chat room right away." },
          { num: 10, type: "text", q: "대화를 듣고, 무엇에 관한 내용인지 가장 적절한 것을 고르시오.", options: ["입학선물", "학교소개", "학급회의", "가족사진", "앨범구입"], answer: 4, script: "M: Wow, you decorated your room with lots of pictures.\nW: Yeah, these are my family pictures.\nM: Cool! Is he your dad?\nW: That’s right. And this is my mom and sister.\nM: I see. And your dog is in almost every family picture.\nW: He likes to take pictures with us, too." },
          { num: 11, type: "text", q: "대화를 듣고, 남자가 이용할 교통수단으로 가장 적절한 것을 고르시오.", options: ["택시", "비행기", "자전거", "지하철", "셔틀버스"], answer: 5, script: "W: Seho, how will you get to the water park this weekend?\nM: I’m not sure, Mom.\nW: You have to carry a heavy bag. How about taking a taxi?\nM: It may be expensive.\nW: Then, why don’t you take a shuttle bus? It’s cheaper.\nM: A shuttle bus? That sounds good." },
          { num: 12, type: "text", q: "대화를 듣고, 여행 장소가 변경된 이유로 가장 적절한 것을 고르시오.", options: ["예산이 부족해서", "비 예보가 있어서", "일정이 너무 빠듯해서", "다른 곳에 가보고 싶어서", "입장권을 구매하지 못해서"], answer: 2, script: "W: Jimin, you are going to Seoraksan Mountain next week, right?\nM: I was going to, but the plan changed.\nW: Why? You really wanted to go.\nM: But the news said it would rain a lot next week.\nW: Yeah, hiking can be dangerous when it rains.\nM: Right. So I decided to go to City Museum." },
          { num: 13, type: "text", q: "대화를 듣고, 두 사람이 대화하는 장소로 가장 적절한 곳을 고르시오.", options: ["서점", "식당", "법원", "편의점", "놀이공원"], answer: 5, script: "M: Wow! Look at the line over there, Somi.\nW: Is that the waiting line for the roller coaster?\nM: Yes. I think we’ll have to wait for more than an hour.\nW: Oh, no. Then, let’s try something else.\nM: I agree. Why don’t we ride bumper cars first?\nW: Good! I like bumper cars, too.\nM: Let’s go!" },
          { num: 14, type: "text", q: "대화를 듣고, 우체국의 위치로 가장 알맞은 곳을 고르시오.", options: ["①", "②", "③", "④", "⑤"], answer: 3, script: "W: Excuse me. Is there a post office around here?\nM: Yes, there is one nearby.\nW: How can I get there from here?\nM: Hmm... Go straight one block and turn right on Golden Street.\nW: On Golden Street?\nM: Yes, the post office will be on your left. It’s next to the bakery." },
          { num: 15, type: "text", q: "대화를 듣고, 여자가 남자에게 부탁한 일로 가장 적절한 것을 고르시오.", options: ["책 빌려주기", "짐 옮겨주기", "숙제 도와주기", "영화 예매하기", "사진 찍어주기"], answer: 1, script: "W: Taemin, I watched the movie, LittleWomen.\nM: Did you? It is also a famous novel.\nW: Really? I didn’t know that. Do you have the book?\nM: Of course, it’s my favorite.\nW: Then, can I borrow your book?\nM: Sure, I’ll bring it tomorrow." },
          { num: 16, type: "text", q: "대화를 듣고, 남자가 여자에게 제안한 것으로 가장 적절한 것을 고르시오.", options: ["봉사활동 하기", "집안 청소하기", "학원 등록하기", "학생증 만들기", "교복 수선하기"], answer: 1, script: "M: Gloria, what are you going to do this Sunday?\nW: I’m going to stay at home. What about you?\nM: I’ll do volunteer work at the animal care center.\nW: Oh, what do you do there?\nM: I usually wash the dogs.\nW: That’s cool!\nM: Will you join me? They need more volunteers.\nW: Okay, I’ll join you." },
          { num: 17, type: "text", q: "대화를 듣고, 남자가 휴일에 한 일로 가장 적절한 것을 고르시오.", options: ["꽃 심기", "창문 닦기", "그림 그리기", "뮤지컬 보기", "친구 만나기"], answer: 1, script: "W: Good morning, Dongjoon. How was your holiday?\nM: It was great! I planted flowers in my garden.\nW: That’s interesting! What kind of flowers did you plant?\nM: They were roses and sunflowers. I hope they grow well.\nW: Wow, you had a wonderful holiday." },
          { num: 18, type: "text", q: "대화를 듣고, 여자의 직업으로 가장 적절한 것을 고르시오.", options: ["은행원", "미술 교사", "심리 상담사", "소아과 의사", "옷가게 점원"], answer: 5, script: "W: May I help you?\nM: Yes, I’d like to try that shirt on.\nW: This one? It’s selling very well.\nM: Do you have it in a different size? It looks too small for me.\nW: Sure, we have this shirt in a large size. Here it is.\nM: Thanks. Where’s the fitting room?\nW: It’s over there." },
          { num: 19, type: "dialogue", q: "M: Jenny, how are you doing these days?", options: ["I got up late.", "You’re welcome.", "I can’t believe it.", "You can swim well.", "You play soccer often."], answer: 2, script: "W: Hi, Mr. Kim. Classes are fine, but I want to make more friends.\nM: Then, would you join my art club? You can make friends there.\nW: But, I’m not good at painting.\nM: Don’t worry. I will help you.\nW: Really? Then I’ll try it. Thank you for helping me.\nM:" },
          { num: 20, type: "dialogue", q: "[Cellphonerings.]", options: ["See you again.", "It’s not my fault.", "It begins at 5 p.m.", "I’m sorry, but I can’t.", "My hobby is reading books."], answer: 3, script: "W: Hello.\nM: Hello, Christine. This is Ted.\nW: Hey, what’s up?\nM: Are you busy this Sunday?\nW: No, I’m free this weekend.\nM: Good. I’m going to have a birthday party on Sunday. Can you come?\nW: Of course, I can. What time does the party start?\nM:\nANN:" }
        ]
      },
      {
        id: "2022_m1_r2",
        title: "2022학년도 제2회",
        subtitle: "중1 영어듣기능력평가",
        date: "2022. 9. 6.",
        audioFile: "https://dfpmpbjhljsyypofpvfu.supabase.co/storage/v1/object/public/listening-audio/2022_m1_r2.m4a",
        youtubeUrl: "",
        questions: [
          { num: 1, type: "image", q: "다음을 듣고, ‘this’가 가리키는 것으로 가장 적절한 것을 고르시오.", options: ["images/2022_m1_r2/q1_1.jpg", "images/2022_m1_r2/q1_2.jpg", "images/2022_m1_r2/q1_3.jpg", "images/2022_m1_r2/q1_4.jpg", "images/2022_m1_r2/q1_5.jpg"], answer: 2, script: "W: Most people use this every day. This is a small brush. You clean your teeth with this. You use this after you eat breakfast, lunch, and dinner.\nWhat is this?" },
          { num: 2, type: "image", q: "대화를 듣고, 남자가 구입할 컵으로 가장 적절한 것을 고르시오.", options: ["images/2022_m1_r2/q2_1.jpg", "images/2022_m1_r2/q2_2.jpg", "images/2022_m1_r2/q2_3.jpg", "images/2022_m1_r2/q2_4.jpg", "images/2022_m1_r2/q2_5.jpg"], answer: 5, script: "W: May I help you?\nM: I want to buy a cup.\nW: What about this one with grapes on it?\nM: No, I don’t like it. Also, I want a cup with a handle.\nW: How about this one? It has a handle. Isn’t this strawberry cute?\nM: I like strawberries. I’ll take it." },
          { num: 3, type: "image", q: "다음을 듣고, 서울의 날씨로 가장 적절한 것을 고르시오.", options: ["images/2022_m1_r2/q3_1.jpg", "images/2022_m1_r2/q3_2.jpg", "images/2022_m1_r2/q3_3.jpg", "images/2022_m1_r2/q3_4.jpg", "images/2022_m1_r2/q3_5.jpg"], answer: 1, script: "M: Good morning. It’s time for the world weather report. In Washington D.C., there will be heavy rain. In Paris, it’ll be very windy. Seoul will be sunny today. The sun will be very strong, so don’t forget to drink a lot of water." },
          { num: 4, type: "text", q: "대화를 듣고, 여자가 한 마지막 말의 의도로 가장 적절한 것을 고르시오.", options: ["당부", "거절", "사과", "초대", "칭찬"], answer: 1, script: "W: Sam, can I talk to you for a second?\nM: Yes, Mom. What’s going on?\nW: You didn’t close the refrigerator door again.\nM: Uh... I thought that I closed it. I’m sorry, Mom.\nW: Make sure to check it well next time." },
          { num: 5, type: "text", q: "다음을 듣고, 남자가 카페에 대해 언급하지 않은 것을 고르시오.", options: ["이름", "위치", "판매 상품", "할인 행사", "분위기"], answer: 4, script: "M: I want to introduce my favorite cafe in our town. The name is Jackson’s\nDesserts.It is on Fifth Avenue next to the Sky Tower. It sells desserts like cakes, cookies, and ice cream. I love this place because it is lively and cheerful." },
          { num: 6, type: "text", q: "대화를 듣고, 두 사람이 이야기를 나누는 현재 시각을 고르시오.", options: ["6:30a.m.", "7:00a.m.", "7:30a.m.", "8:00a.m.", "8:30a.m."], answer: 1, script: "M: Did you pack everything?\nW: Yes, Dad. How long will it take to get there?\nM: It’ll take about 1 hour to get to the camping site.\nW: What time will we arrive?\nM: It’s 6:30 a.m. now, so we’ll be there by 7:30.\nW: Oh, it’s only 6:30? It’s still early!" },
          { num: 7, type: "text", q: "대화를 듣고, 남자의 장래 희망으로 가장 적절한 것을 고르시오.", options: ["수의사", "건축가", "피아니스트", "광고 제작자", "컴퓨터 프로그래머"], answer: 5, script: "W: Mark, are you playing computer games again?\nM: Mom, I’m not playing. I’m making a program.\nW: Oh, is it part of your school homework?\nM: Yes. And it’s really fun. I want to be a computer programmer someday.\nW: Yes, I believe you can be.\nM: Thanks, Mom. I’ll do my best." },
          { num: 8, type: "text", q: "대화를 듣고, 여자의 심정으로 가장 적절한 것을 고르시오.", options: ["설렘", "즐거움", "부러움", "실망스러움", "자랑스러움"], answer: 4, script: "M: Becky, are you okay? You look different today.\nW: Well, it’s because of the audition.\nM: You mean, the singing audition?\nW: Yeah, I didn’t pass it.\nM: Really? I’m sorry to hear that. You practiced a lot.\nW: I did. I tried my best, but I failed it." },
          { num: 9, type: "text", q: "대화를 듣고, 여자가 대화 직후에 할 일로 가장 적절한 것을 고르시오.", options: ["방 청소하기", "이불 정리하기", "과일 구입하기", "샌드위치 만들기", "남편에게 전화하기"], answer: 4, script: "M: Mom, I’m hungry.\nW: Already? Would you like some fruit?\nM: Hmm... Do we have anything else?\nW: Then, what do you want to eat?\nM: Can I have a sandwich, please?\nW: Okay. I’ll make one for you right now.\nM: Thanks, Mom. You’re the best!" },
          { num: 10, type: "text", q: "대화를 듣고, 무엇에 관한 내용인지 가장 적절한 것을 고르시오.", options: ["동아리 홍보", "공연 팀 모집", "교복 구매 공지", "급식 메뉴 안내", "댄스 대회 취소"], answer: 5, script: "[Cellphonerings.]\nW: Hey, did you hear the news? The dance contest was canceled.\nM: What happened?\nW: There were not enough teams in the contest.\nM: Oh, no. My friends and I were planning to do a hip-hop dance.\nW: Sorry to hear that. I know you practiced a lot.\nM: We did. We have to wait until next year, then.\nW: That’s right." },
          { num: 11, type: "text", q: "대화를 듣고, 두 사람이 함께 이용할 교통수단으로 가장 적절한 것을", options: ["버스", "택시", "비행기", "자전거", "지하철"], answer: 5, script: "M: Jane, would you like to go shopping today?\nW: Sure. Where do you want to go?\nM: I’m thinking of City Mall near our school.\nW: Alright. Should we take a bus?\nM: The traffic is heavy. Why don’t we take the subway?\nW: The subway sounds good. See you later." },
          { num: 12, type: "text", q: "대화를 듣고, 남자가 미술관에 가지 못하는 이유로 가장 적절한 것을", options: ["다리를 다쳐서", "강아지가 아파서", "날씨가 좋지 않아서", "가족 모임이 있어서", "숙제를 끝내지 못해서"], answer: 2, script: "W: Ben, are you going to the art museum this afternoon?\nM: I really want to, but I can’t.\nW: Why not? You were so excited.\nM: My puppy is sick.\nW: What’s wrong with her?\nM: I don’t know. I have to take her to the animal doctor.\nW: I’m sorry. I hope she’s going to be okay." },
          { num: 13, type: "text", q: "대화를 듣고, 두 사람이 대화하는 장소로 가장 적절한 곳을 고르시오.", options: ["공원", "극장", "기차역", "도서관", "경찰서"], answer: 3, script: "M: Hello, how can I help you?\nW: I’d like three tickets to Busan, please.\nM: There is a train leaving at 7 p.m.\nW: When is the next train leaving?\nM: It’s at 8 o’clock.\nW: 8 o’clock sounds good to me.\nM: It’ll be 30 dollars. Cash or credit card?\nW: Here’s my credit card." },
          { num: 14, type: "text", q: "대화를 듣고, 남자가 찾고 있는 명찰의 위치로 가장 알맞은 곳을 고르시오.", options: ["①", "②", "③", "④", "⑤"], answer: 3, script: "W: What are you doing, Jian? You are late.\nM: Mom, I can’t find my name tag. Did you see it?\nW: Isn’t it on the table?\nM: No, I already checked. It isn’t on the sofa, either.\nW: Then, did you look under the chair?\nM: [Pause] Oh, I found it. It’s under the chair." },
          { num: 15, type: "text", q: "대화를 듣고, 여자가 남자에게 부탁한 일로 가장 적절한 것을 고르시오.", options: ["우산 챙기기", "날씨 검색하기", "입장권 예매하기", "도시락 준비하기", "교통편 찾아보기"], answer: 2, script: "M: Honey, let’s go to the beach this weekend.\nW: That sounds good. But we should check the weather first.\nM: You’re right. It rained so much last time.\nW: That was really terrible.\nM: I hope the sky is clear this time.\nW: Can you look up the weather on the Internet now?\nM: Sure!" },
          { num: 16, type: "text", q: "대화를 듣고, 남자가 여자에게 제안한 것으로 가장 적절한 것을 고르시오.", options: ["병원 예약하기", "준비운동 하기", "두꺼운 옷 입기", "가습기 구입하기", "따뜻한 물 마시기"], answer: 5, script: "M: Tina, are you okay?\nW: No, I’m not. I didn’t bring my jacket. It’s so cold in here.\nM: You’re right. And I think the heater is not working again.\nW: I feel so cold. What can I do?\nM: Why don’t you drink some warm water?\nW: Good idea. Warm water will help me." },
          { num: 17, type: "text", q: "대화를 듣고, 여자가 지난 토요일에 한 일로 가장 적절한 것을 고르시오.", options: ["축구 연습", "오디션 참가", "야구 경기 관람", "할머니 댁 방문", "다큐멘터리 시청"], answer: 3, script: "W: Did you watch the baseball game last Saturday?\nM: No, I missed it. How was it?\nW: It was so exciting. I watched it at the stadium with my dad.\nM: You must really like baseball.\nW: Yeah. And I was happy because my team won.\nM: Good for you!" },
          { num: 18, type: "text", q: "대화를 듣고, 여자의 직업으로 가장 적절한 것을 고르시오.", options: ["사회복지사", "우체국 직원", "뮤지컬 배우", "테니스 코치", "자동차 정비사"], answer: 3, script: "M: Monica, I just saw your performance in the musical.\nW: I’m glad you came, Hosung.\nM: I loved your acting. Your fans will love it, too.\nW: I hope they like it!\nM: Your singing and dancing were also amazing.\nW: Thanks. I practiced a lot for this musical.\nM: I see. Good luck with your next performance." },
          { num: 19, type: "dialogue", q: "W: What did you do last weekend, Alex?", options: ["He has to see a doctor.", "Yes, I’ll be there soon.", "I can’t wait to see him.", "Thanks for saying that.", "No, I didn’t ride a bike."], answer: 4, script: "M: I went to Lake Park and rode a bike.\nW: Lake Park? I was there, too!\nM: Really? What did you do there?\nW: I took pictures of the nature. Look! Here are my photos.\nM: Wow! All your photos are amazing. You’re a good photographer.\nW: ________________________________________________" },
          { num: 20, type: "dialogue", q: "W: Hello, Mr. Lee.", options: ["It’s my pleasure.", "It will be sunny today.", "I’ll go fishing with my dad.", "I can finish it by tomorrow.", "I usually wake up at 7 o’clock."], answer: 4, script: "M: Hello, Molly. What’s the matter?\nW: I couldn’t finish my math homework yet.\nM: Do you need more time?\nW: Yes, please. I didn’t have much time because I was sick.\nM: Oh, are you okay now?\nW: Yes, I’m fine now.\nM: Good. Then, when can you finish it?\nW: ________________________________________________\nANN:" }
        ]
      },
      {
        id: "2023_m1_r1",
        title: "2023학년도 제1회",
        subtitle: "중1 영어듣기능력평가",
        date: "2023. 4. 4.",
        audioFile: "https://dfpmpbjhljsyypofpvfu.supabase.co/storage/v1/object/public/listening-audio/2023_m1_r1.m4a",
        youtubeUrl: "",
        questions: [
          { num: 1, type: "image", q: "다음을 듣고, ‘I’가 무엇인지 가장 적절한 것을 고르시오.", options: ["images/2023_m1_r1/q1_1.jpg", "images/2023_m1_r1/q1_2.jpg", "images/2023_m1_r1/q1_3.jpg", "images/2023_m1_r1/q1_4.jpg", "images/2023_m1_r1/q1_5.jpg"], answer: 1, script: "W: I have four legs. I have big, long ears. I can jump well and run fast. I eat plants, and I have big front teeth. I usually dig a hole and live in there.\nWhat am I?" },
          { num: 2, type: "image", q: "대화를 듣고, 남자가 만든 오븐 장갑으로 가장 적절한 것을 고르시오.", options: ["images/2023_m1_r1/q2_1.jpg", "images/2023_m1_r1/q2_2.jpg", "images/2023_m1_r1/q2_3.jpg", "images/2023_m1_r1/q2_4.jpg", "images/2023_m1_r1/q2_5.jpg"], answer: 2, script: "W: Yoonwoo, what’s that?\nM: It’s an oven glove for my mother. I made it myself.\nW: Why did you draw dots on it? I thought you like stripes.\nM: I do, but my mom likes dots more.\nW: I see. I hope she likes it." },
          { num: 3, type: "image", q: "다음을 듣고, 로스앤젤레스의 날씨로 가장 적절한 것을 고르시오.", options: ["images/2023_m1_r1/q3_1.jpg", "images/2023_m1_r1/q3_2.jpg", "images/2023_m1_r1/q3_3.jpg", "images/2023_m1_r1/q3_4.jpg", "images/2023_m1_r1/q3_5.jpg"], answer: 4, script: "W: Good morning! It’s time for the US weather report. In Boston, there will be heavy rain. It will be windy in Chicago. Los Angeles will be hot and sunny. If you’re in Los Angeles, don’t forget to put on sun cream." },
          { num: 4, type: "text", q: "대화를 듣고, 남자가 한 마지막 말의 의도로 가장 적절한 것을 고르시오.", options: ["승낙", "거절", "위로", "사과", "항의"], answer: 1, script: "[Cellphonerings.]\nW: Hey, Richard. What are you going to do this Sunday?\nM: Nothing much. I’ll just take a rest.\nW: Jungmin and I are riding bikes together. Why don’t you join us?\nM: Oh, I can’t. My bicycle is broken.\nW: You can ride my brother’s bike.\nM: Really? Okay, I’ll join you." },
          { num: 5, type: "text", q: "다음을 듣고, 남자가 학교 밴드에 대해 언급하지 않은 것을 고르시오.", options: ["이름", "인원수", "지도 교사", "연습 시간", "연습 장소"], answer: 3, script: "M: Let me introduce our school band. Its name is TheMemories. There are ten members. We practice from 4 p.m. to 5 p.m. every day. We practice in the music room on the second floor next to the cafeteria. If you are interested, come to the music room." },
          { num: 6, type: "text", q: "대화를 듣고, 두 사람이 이야기를 나누는 현재 시각을 고르시오.", options: ["5:00p.m.", "5:30p.m.", "6:00p.m.", "6:30p.m.", "7:00p.m."], answer: 3, script: "W: Sorry, I’m late. Did the baseball game start?\nM: It started at 5:30 p.m. What happened?\nW: I took the wrong subway. I’m really sorry.\nM: That’s okay. We can still enjoy the game.\nW: Thanks. Look! The main gate is over there.\nM: It’s 6 p.m. now. Let’s hurry." },
          { num: 7, type: "text", q: "대화를 듣고, 여자의 장래 희망으로 가장 적절한 것을 고르시오.", options: ["교사", "경호원", "변호사", "제빵사", "영화감독"], answer: 4, script: "W: Hello, Mr. Lee. Would you like some muffins?\nM: Oh, thank you. [Pause] Wow, these are really good!\nW: I’m glad you like them. I baked them myself in class.\nM: That’s amazing!\nW: Thanks. I want to become a baker when I grow up.\nM: I think you’ll be an excellent baker." },
          { num: 8, type: "text", q: "대화를 듣고, 여자의 심정으로 가장 적절한 것을 고르시오.", options: ["설렘", "평온함", "지루함", "자랑스러움", "당황스러움"], answer: 5, script: "M: What’s wrong, Katie?\nW: I can’t find my bag. What should I do?\nM: Where did you put it?\nW: I think I left it on the bus. I don’t know what to do.\nM: How about calling the bus company?\nW: Oh, no! I can’t. My phone is in the bag." },
          { num: 9, type: "text", q: "대화를 듣고, 남자가 대화 직후에 할 일로 가장 적절한 것을 고르시오.", options: ["창문 열기", "전등 끄기", "물 갖다주기", "약 찾아보기", "인터넷 검색하기"], answer: 1, script: "M: What’s wrong, Mina?\nW: I have a terrible headache.\nM: I’m sorry to hear that. Did you take medicine?\nW: Yeah, but it’s not getting better.\nM: Well, then, how about getting some fresh air?\nW: That sounds good. Could you open the window for me?\nM: Sure. I’ll open it right now." },
          { num: 10, type: "text", q: "대화를 듣고, 무엇에 관한 내용인지 가장 적절한 것을 고르시오.", options: ["수학 시험", "음악 방송", "수업 준비물", "시간표 변경", "교무실 위치"], answer: 4, script: "W: Tom, let’s go to the science classroom.\nM: The science classroom? Isn’t it math class now, Yumi?\nW: No, today’s timetable changed. It’s science class now.\nM: Really? I didn’t know that.\nW: Mr. Yoon told us this morning.\nM: Thank you for telling me." },
          { num: 11, type: "text", q: "대화를 듣고, 두 사람이 함께 이동할 방법으로 가장 적절한 것을 고르시오.", options: ["택시", "도보", "기차", "버스", "자전거"], answer: 3, script: "M: Amy, how do we get to Seoul this weekend?\nW: Why don’t we take a bus?\nM: But I always feel sick on a bus.\nW: Oh, I’m sorry. I forgot.\nM: How about taking a train?\nW: That sounds better. Let’s take a train, then.\nM: Okay. I’ll check the schedule." },
          { num: 12, type: "text", q: "대화를 듣고, 여자가 우산을 찾는 이유로 가장 적절한 것을 고르시오.", options: ["반품하기 위해서", "햇볕을 가리기 위해서", "비를 맞지 않기 위해서", "준비물로 챙기기 위해서", "친구에게 돌려주기 위해서"], answer: 5, script: "W: Dad, did you see the blue umbrella in my room?\nM: Yes. I put it at the front door. Is it going to rain today?\nW: No. I borrowed it from my friend the other day.\nM: Oh, you did?\nW: Yeah. I’m going to give it back to her today.\nM: Ah, I see." },
          { num: 13, type: "text", q: "대화를 듣고, 두 사람이 대화하는 장소로 가장 적절한 곳을 고르시오.", options: ["경찰서", "도서관", "소방서", "영화관", "수족관"], answer: 2, script: "M: Lina, do you want some snacks?\nW: Dongjoon, you can’t eat here!\nM: Really? I didn’t know that.\nW: Also, you have to be quiet. People are reading books here.\nM: I got it. I’ll keep that in mind.\nW: Anyway, I found a book. I’m going to borrow it.\nM: Okay. Let’s go to the front desk." },
          { num: 14, type: "text", q: "대화를 듣고, 꽃가게의 위치로 가장 알맞은 곳을 고르시오.", options: ["①", "②", "③", "④", "⑤"], answer: 3, script: "M: Excuse me. Is there a flower shop nearby?\nW: Yes, there’s one near here.\nM: Could you tell me how to get there?\nW: Sure. Go straight one block and turn left on Main Street.\nM: Turn left on Main Street?\nW: Yes. The flower shop will be on your right. It’s between the bank and the hospital." },
          { num: 15, type: "text", q: "대화를 듣고, 여자가 남자에게 부탁한 일로 가장 적절한 것을 고르시오.", options: ["설거지하기", "집 정리하기", "옷 수선하기", "숙소 예약하기", "수리점에 전화하기"], answer: 5, script: "W: Oh, the washing machine is not working!\nM: Not again! What’s the problem?\nW: I can’t turn it on. I think the button is broken.\nM: Really? We have many clothes to wash.\nW: Can you call a repair shop to make a reservation?\nM: Sure, I’ll do it right now." },
          { num: 16, type: "text", q: "대화를 듣고, 여자가 남자에게 제안한 것으로 가장 적절한 것을 고르시오.", options: ["쪽지 쓰기", "강아지 키우기", "음악 감상하기", "귀마개 구입하기", "경찰서에 문의하기"], answer: 1, script: "W: Arthur, you look so tired.\nM: Well, I didn’t sleep well.\nW: Why?\nM: My neighbor’s dogs barked loudly last night, so I couldn’t sleep.\nW: I’m sorry to hear that. How about writing a note to your neighbor?\nM: Yeah, writing a note sounds good." },
          { num: 17, type: "text", q: "대화를 듣고, 남자가 일요일에 할 일로 가장 적절한 것을 고르시오.", options: ["세차하기", "캠핑 가기", "병문안 가기", "뮤지컬 보기", "열쇠고리 만들기"], answer: 2, script: "M: What do you think of this key ring?\nW: It’s so cute! Did you buy it?\nM: No, I didn’t. I made it for my cousin. He’ll come to my house this weekend.\nW: Do you have any plans with him?\nM: We are planning to go camping together this Sunday.\nW: Sounds fun. Enjoy camping." },
          { num: 18, type: "text", q: "대화를 듣고, 여자의 직업으로 가장 적절한 것을 고르시오.", options: ["화가", "작가", "마술사", "요리사", "택배기사"], answer: 3, script: "W: Is there anything in the box?\nM: No, there’s nothing in it.\nW: Now, look at this picture in my hand. What is it?\nM: It’s a bird.\nW: I’ll put this picture in the box. Please count to three.\nM: One, two, three...\nW: Ta-da! Surprise! [Birdflyingsound]\nM: Wow! It’s a real bird!" },
          { num: 19, type: "dialogue", q: "[Telephonerings.]", options: ["No, thanks.", "Credit card, please.", "Let’s go see my uncle.", "The salad is 10 dollars.", "I’m writing Mom a Christmas card."], answer: 2, script: "W: Uncle Ben’s Pizza. How can I help you?\nM: Hi, I’d like to order a large cheese pizza, please.\nW: That’ll be 20 dollars. May I take your address?\nM: It’s 15 Wilson Street, across from the City Hall.\nW: Okay. Will you pay by cash or credit card?\nM:" },
          { num: 20, type: "dialogue", q: "W: June, which after-school class do you want to join?", options: ["I love exercise.", "Long time no see.", "It’s raining outside.", "That’s a great idea.", "Don’t try this at home."], answer: 4, script: "M: I’m not sure. How about you?\nW: I’m thinking of joining the robot coding class.\nM: Wow! A robot coding class?\nW: Yeah. Every member gets the chance to make a robot.\nM: I want to try that, too.\nW: Why don’t we join this class together?\nM:\nANN:" }
        ]
      },
      {
        id: "2023_m1_r2",
        title: "2023학년도 제2회",
        subtitle: "중1 영어듣기능력평가",
        date: "2023. 9. 5.",
        audioFile: "https://dfpmpbjhljsyypofpvfu.supabase.co/storage/v1/object/public/listening-audio/2023_m1_r2.m4a",
        youtubeUrl: "",
        questions: [
          { num: 1, type: "image", q: "다음을 듣고, ‘this’가 가리키는 것으로 가장 적절한 것을 고르시오.", options: ["images/2023_m1_r2/q1_1.jpg", "images/2023_m1_r2/q1_2.jpg", "images/2023_m1_r2/q1_3.jpg", "images/2023_m1_r2/q1_4.jpg", "images/2023_m1_r2/q1_5.jpg"], answer: 2, script: "M: You usually use this in summer. It has three or more wings. You can turn this on when you feel hot. It makes wind and cools you down. What is this?" },
          { num: 2, type: "image", q: "대화를 듣고, 여자가 구입할 티셔츠로 가장 적절한 것을 고르시오.", options: ["images/2023_m1_r2/q2_1.jpg", "images/2023_m1_r2/q2_2.jpg", "images/2023_m1_r2/q2_3.jpg", "images/2023_m1_r2/q2_4.jpg", "images/2023_m1_r2/q2_5.jpg"], answer: 1, script: "M: What can I do for you?\nW: I want to buy a T-shirt for my daughter.\nM: How about this one with a big heart on it?\nW: I don’t like it. I want a T-shirt with no pattern on it.\nM: Okay. What about this one with a pocket? It has no pattern.\nW: I love it! I’ll take it." },
          { num: 3, type: "image", q: "다음을 듣고, 금요일의 날씨로 가장 적절한 것을 고르시오.", options: ["images/2023_m1_r2/q3_1.jpg", "images/2023_m1_r2/q3_2.jpg", "images/2023_m1_r2/q3_3.jpg", "images/2023_m1_r2/q3_4.jpg", "images/2023_m1_r2/q3_5.jpg"], answer: 2, script: "M: Good evening. This is the weekly weather report. Today, we had clear sunny skies. However, Thursday will be a rainy day. It will snow on\nFriday. The snow will continue until Saturday. So, be careful when you drive." },
          { num: 4, type: "text", q: "대화를 듣고, 남자가 한 마지막 말의 의도로 가장 적절한 것을 고르시오.", options: ["사과", "충고", "감사", "불평", "위로"], answer: 3, script: "W: Hi, Jason. What are you doing here?\nM: I want to move this box, but it is too heavy.\nW: Oh, let me help you. Where are you going?\nM: I need to take it to the classroom.\nW: Alright. Let’s carry it together.\nM: Thank you for helping me." },
          { num: 5, type: "text", q: "다음을 듣고, 여자가 화가에 대해 언급하지 않은 것을 고르시오.", options: ["이름", "출생지", "가족 관계", "나이", "대표작"], answer: 3, script: "W: Hi, everyone. Today, I will tell you about an amazing painter. Her name is\nRosa Sanchez. She was born in Mexico, but now she lives in France. She is only 20 years old, but she is already a very successful artist. Her most famous painting is called TheSmilingMountain." },
          { num: 6, type: "text", q: "대화를 듣고, 두 사람이 만날 시각을 고르시오.", options: ["3:00p.m.", "4:00p.m.", "5:00p.m.", "6:00p.m.", "7:00p.m."], answer: 2, script: "[Telephonerings.]\nW: Hey, Stephen.\nM: Hey, Kim. What time should I pick you up?\nW: Well, when do we have to get to the airport?\nM: Our flight is at 7 p.m., so we have to get there by 5 p.m.\nW: Hmm... Then, can you come to my house by 4 p.m.?\nM: Sure. I’ll pick you up at 4.\nW: See you soon!" },
          { num: 7, type: "text", q: "대화를 듣고, 남자의 장래 희망으로 가장 적절한 것을 고르시오.", options: ["가수", "작곡가", "안무가", "드럼 연주자", "영상 제작자"], answer: 4, script: "W: Jacob, what are you watching?\nM: I’m watching a video clip of John Grey.\nW: Oh, he’s playing the drums.\nM: He’s one of the greatest drummers of all time.\nW: Wow, he’s amazing. I can’t see his hands.\nM: That’s what I’m saying. I want to be a drummer like him.\nW: I’m sure you will be." },
          { num: 8, type: "text", q: "대화를 듣고, 여자의 심정으로 가장 적절한 것을 고르시오.", options: ["sad", "shy", "bored", "proud", "excited"], answer: 5, script: "M: Look at this! This is the schedule for the field trip.\nW: Oh! We’re finally leaving next week.\nM: Wow! There are lots of fun activities.\nW: Yeah. We will go to a water park on the second day of the trip.\nM: Right. I’ll ride the water slide many times.\nW: Me, too. I can’t wait!" },
          { num: 9, type: "text", q: "대화를 듣고, 두 사람이 대화 직후에 할 일로 가장 적절한 것을 고르시오.", options: ["김밥 만들기", "샌드위치 먹기", "휴대폰 충전하기", "햄버거 재료 사기", "식당 가는 길 검색하기"], answer: 5, script: "W: Oh, look! Bob’s Sandwich Store is closed, Mike.\nM: That’s too bad. What do you want to eat, then?\nW: How about a hamburger?\nM: I like hamburgers, too. Do you know any good restaurant?\nW: Yes. But I’m not sure how to get there.\nM: Let’s search on my phone." },
          { num: 10, type: "text", q: "대화를 듣고, 무엇에 관한 내용인지 가장 적절한 것을 고르시오.", options: ["민속 놀이", "상품 주문", "가족 여행", "컴퓨터 게임", "방과후 수업"], answer: 4, script: "M: Tina, that looks fun!\nW: It is. This is my favorite computer game.\nM: What’s it about?\nW: You play as a hero, and you have to save the world.\nM: Sounds interesting. Can I play it with you?\nW: Yes. We can play together online.\nM: That’s great!" },
          { num: 11, type: "text", q: "대화를 듣고, 두 사람이 함께 이동할 방법으로 가장 적절한 것을 고르시오.", options: ["기차", "도보", "자동차", "자전거", "지하철"], answer: 3, script: "W: What time does your basketball lesson start today?\nM: It starts at 3 o’clock.\nW: But it’s already 3. You’re late!\nM: Oh, no! It takes more than 30 minutes to get there by bike.\nW: I’ll take you there by car. Hurry!\nM: Thank you, Mom. Let’s go!" },
          { num: 12, type: "text", q: "대화를 듣고, 여자가 편지를 쓰는 이유로 가장 적절한 것을 고르시오.", options: ["동생과 다투어서", "할아버지 생신이어서", "영어 선생님이 떠나셔서", "친구가 상을 받게 되어서", "부모님의 결혼기념일이어서"], answer: 3, script: "M: Hayoon, what are you writing?\nW: I’m writing a letter to Ms. Johnson, Dad.\nM: You mean your English teacher?\nW: Yes. She is leaving Korea next month, so I’m writing her a letter.\nM: Why is she leaving?\nW: She is going back to her family in the US." },
          { num: 13, type: "text", q: "대화를 듣고, 두 사람이 대화하는 장소로 가장 적절한 곳을 고르시오.", options: ["보건소", "볼링장", "미술관", "관광 안내소", "야외 공연장"], answer: 4, script: "W: May I help you?\nM: I need information about famous places around here.\nW: Here’s the city tour map. You can see the popular places.\nM: Oh, thank you.\nW: How about taking the city tour bus? It goes to all the good places.\nM: Great. Where can I buy a ticket?\nW: You can buy one online. I’ll show you how." },
          { num: 14, type: "text", q: "대화를 듣고, 두 사람이 램프를 둘 위치로 가장 알맞은 곳을 고르시오.", options: ["①", "②", "③", "④", "⑤"], answer: 4, script: "W: What a beautiful lamp!\nM: I’m glad you like it. I bought this for your birthday.\nW: Thank you, honey. Where should we put it?\nM: We can put it next to the TV.\nW: I don’t think that’s a good idea. How about on the round table?\nM: That’ll be nice." },
          { num: 15, type: "text", q: "대화를 듣고, 남자가 여자에게 부탁한 일로 가장 적절한 것을 고르시오.", options: ["금붕어 먹이 주기", "미술학원 등록하기", "수제 요거트 만들기", "겨울방학 계획 짜기", "신문 기사 스크랩하기"], answer: 1, script: "W: Did you pack everything?\nM: Yes, Mom. I can’t wait to go on a trip to Busan.\nW: Have a great time with Dad, sweetie.\nM: Okay, I will. Please don’t forget to feed my goldfish.\nW: Don’t worry. Feed your goldfish twice a day, right?\nM: Perfect. Thanks a lot." },
          { num: 16, type: "text", q: "대화를 듣고, 여자가 남자에게 제안한 것으로 가장 적절한 것을 고르시오.", options: ["포스터 제작하기", "참가자 명단 작성하기", "동아리 회원 모집하기", "배드민턴 수업 등록하기", "지구의 날 행사 참여하기"], answer: 5, script: "W: Gary, what are you going to do next Monday?\nM: I don’t have any plans yet. Is there anything happening?\nW: Would you like to join the Earth Day event with me?\nM: Earth Day event?\nW: We can learn how to protect the environment at this event.\nM: That’ll be nice. Let’s go together." },
          { num: 17, type: "text", q: "대화를 듣고, 두 사람이 주말에 할 일로 가장 적절한 것을 고르시오.", options: ["쇼핑하기", "요리하기", "산책하기", "축제 가기", "공연 보기"], answer: 1, script: "M: Mom, let’s go to the amusement park this Sunday.\nW: I don’t think it’s a good idea.\nM: Why?\nW: It’s too crowded on weekends, and we have to wait in long lines.\nM: I see. Then, how about going shopping instead?\nW: Okay. You said you need new clothes." },
          { num: 18, type: "text", q: "대화를 듣고, 여자의 직업으로 가장 적절한 것을 고르시오.", options: ["의사", "가수", "군인", "경찰", "농부"], answer: 1, script: "W: What’s the matter today?\nM: I have a fever and a sore throat.\nW: Let’s see. Open your mouth wide. [Pause] Your throat is very red.\nM: Is it serious?\nW: Not really. Just take this medicine and get some rest.\nM: Should I come again?\nW: If you still feel sick in three days, you should come back." },
          { num: 19, type: "dialogue", q: "M: Do you have children?", options: ["Don’t worry.", "It looks pretty.", "This is my dad.", "His name is Sam.", "He is 9 years old."], answer: 5, script: "W: Yes, I have two, a boy and a girl. This is a picture of them.\nM: Oh, how lovely! Who’s this?\nW: This is Gina, my first child. She is 15 years old.\nM: Is she in middle school?\nW: Yes, she is. And this is my son, Sam.\nM: How old is he?\nW: ________________________________________________" },
          { num: 20, type: "dialogue", q: "W: Here is a little present for you.", options: ["What’s wrong?", "That’s too bad.", "He’s from Canada.", "I’m glad you like it.", "This is a nice pencil."], answer: 4, script: "M: Thank you very much. Can I open it right now?\nW: Sure, you can. I hope you like it.\nM: What a nice belt!\nW: I remember you needed a new one.\nM: How kind! It’s just what I wanted.\nW: ________________________________________________\nANN:" }
        ]
      },
      {
        id: "2024_m1_r1",
        title: "2024학년도 제1회",
        subtitle: "중1 영어듣기능력평가",
        date: "2024. 4. 2.",
        audioFile: "https://dfpmpbjhljsyypofpvfu.supabase.co/storage/v1/object/public/listening-audio/2024_m1_r1.m4a",
        youtubeUrl: "",
        questions: [
          { num: 1, type: "image", q: "다음을 듣고, ‘I’가 무엇인지 가장 적절한 것을 고르시오.", options: ["images/2024_m1_r1/q1_1.jpg", "images/2024_m1_r1/q1_2.jpg", "images/2024_m1_r1/q1_3.jpg", "images/2024_m1_r1/q1_4.jpg", "images/2024_m1_r1/q1_5.jpg"], answer: 1, script: "W: I’m a small insect. I have 6 legs. I usually make homes under the ground or inside a tree. I live in large groups with a queen. I work together with others to get food. What am I?" },
          { num: 2, type: "image", q: "대화를 듣고, 여자가 구입할 코트로 가장 적절한 것을 고르시오.", options: ["images/2024_m1_r1/q2_1.jpg", "images/2024_m1_r1/q2_2.jpg", "images/2024_m1_r1/q2_3.jpg", "images/2024_m1_r1/q2_4.jpg", "images/2024_m1_r1/q2_5.jpg"], answer: 5, script: "M: How can I help you?\nW: I’m looking for a coat for my daughter.\nM: How about this one with the big heart?\nW: Not bad, but she likes small dots more.\nM: What about this one with dots? It has pockets, too.\nW: I love it. I’ll buy that." },
          { num: 3, type: "image", q: "다음을 듣고, 독도의 오늘 오후 날씨로 가장 적절한 것을 고르시오.", options: ["images/2024_m1_r1/q3_1.jpg", "images/2024_m1_r1/q3_2.jpg", "images/2024_m1_r1/q3_3.jpg", "images/2024_m1_r1/q3_4.jpg", "images/2024_m1_r1/q3_5.jpg"], answer: 1, script: "W: Hello! This is Dokdo Weather News. Yesterday, it rained, and it stopped at midnight. It’s windy this morning. But, this afternoon, it will be clear and sunny. You can enjoy the pretty sunshine in Dokdo." },
          { num: 4, type: "text", q: "대화를 듣고, 남자가 한 마지막 말의 의도로 가장 적절한 것을 고르시오.", options: ["감사", "거절", "격려", "사과", "항의"], answer: 4, script: "W: Excuse me.\nM: Good evening, ma’am. What can I do for you?\nW: Well, the air conditioner in my room doesn’t work.\nM: I see. Can you tell me your room number, please?\nW: I’m in room 301.\nM: I will check it out right away. Sorry for the trouble." },
          { num: 5, type: "text", q: "다음을 듣고, 여자가 마라톤 행사에 대해 언급하지 않은 것을 고르시오.", options: ["행사 날짜", "달리는 거리", "출발 지점", "도착 지점", "신청 방법"], answer: 4, script: "W: This spring we’ll have the School Marathon Event. It will take place on\nApril 14th. We will run for 5 kilometers. The starting point will be the school front gate. We will run along the river. You can sign up for the marathon on the school website." },
          { num: 6, type: "text", q: "대화를 듣고, 두 사람이 만날 시각을 고르시오.", options: ["12:30p.m.", "1:00p.m.", "1:30p.m.", "2:00p.m.", "2:30p.m."], answer: 4, script: "M: Hey, Alex. Do you want to watch a movie together?\nW: Sure. I like science-fiction movies.\nM: Then, how about Spaceship12?\nW: Great. What time should we meet?\nM: The movie starts at 2:30 p.m., so how about 1:30 p.m.?\nW: That’s a bit early. How about 2 p.m.?\nM: Okay. Let’s meet at 2 p.m. in front of the theater." },
          { num: 7, type: "text", q: "대화를 듣고, 남자의 장래 희망으로 가장 적절한 것을 고르시오.", options: ["성악가", "작곡가", "지휘자", "피아노 연주자", "바이올린 연주자"], answer: 5, script: "[Orchestrasound]\nW: Wow! It’s a wonderful orchestra.\nM: Yeah, different musical instruments come together to make a beautiful sound.\nW: What are those instruments? They all have strings.\nM: They are violins, violas, and cellos.\nW: Wow! How did you know that?\nM: I’m interested in classical music. I want to be a violinist.\nW: That’s great." },
          { num: 8, type: "text", q: "대화를 듣고, 남자의 심정으로 가장 적절한 것을 고르시오.", options: ["설렘", "지루함", "평화로움", "자랑스러움", "당황스러움"], answer: 5, script: "M: Oh, my smartphone is off. The battery is dead.\nW: You didn’t check your battery?\nM: No, I didn’t. Can I borrow your phone? I need to call my dad.\nW: Here it is.\nM: Oh, no. I can’t remember my dad’s phone number!\nW: That’s too bad." },
          { num: 9, type: "text", q: "대화를 듣고, 여자가 대화 직후에 할 일로 가장 적절한 것을 고르시오.", options: ["그림 그리기", "도서관 가기", "학생증 신청하기", "미술관 관람하기", "인터넷 검색하기"], answer: 2, script: "M: What are you going to draw for your Korean art project?\nW: I have no idea.\nM: Did you search for some famous Korean paintings on the Internet?\nW: I did, but I didn’t like any of them.\nM: How about going to the library? There are many Korean art books.\nW: That’s a good idea. I’ll go now." },
          { num: 10, type: "text", q: "대화를 듣고, 무엇에 관한 내용인지 가장 적절한 것을 고르시오.", options: ["물건 나눔", "실내 환기", "우편 발송", "온라인 수업", "장난감 주문"], answer: 1, script: "W: Jake, what are these toys on the floor?\nM: They’re my old toys, Mom. I don’t play with them anymore.\nW: What are you going to do with them?\nM: I’m going to give them away for free. Will you help me post about them online?\nW: That’s great. I’ll help you.\nM: Thanks, Mom." },
          { num: 11, type: "text", q: "대화를 듣고, 두 사람이 함께 이동할 방법으로 가장 적절한 것을 고르시오.", options: ["배", "기차", "버스", "비행기", "자동차"], answer: 4, script: "W: Dad, how are we going to get to Gwangju for uncle’s wedding?\nM: Well, I’m not sure. Maybe we’ll go by car or by bus.\nW: Why don’t we take an airplane instead?\nM: Really? Do you want to fly to Gwangju?\nW: Yes, I want to get there fast.\nM: Okay. Let’s go by plane." },
          { num: 12, type: "text", q: "대화를 듣고, 여자가 시청에 가는 이유로 가장 적절한 것을 고르시오.", options: ["봉사활동을 하려고", "서류를 발급하려고", "자료를 검색하려고", "그림책을 대출하려고", "무료 강좌를 수강하려고"], answer: 1, script: "M: Sumin, where are you going?\nW: I’m going to City Hall to take part in the Reading Friend Program.\nM: What’s it about?\nW: It’s a volunteer program. I read English picture books to kids.\nM: That’s cool! I know you like children and English.\nW: Yes. I’m so excited to volunteer." },
          { num: 13, type: "text", q: "대화를 듣고, 두 사람이 대화하는 장소로 가장 적절한 곳을 고르시오.", options: ["약국", "우체국", "체육관", "미용실", "신발 가게"], answer: 5, script: "M: May I help you?\nW: I bought these black slippers yesterday, but I’d like to exchange them for another color.\nM: Okay, which color do you like?\nW: Do you have any slippers in bright colors?\nM: We have white ones in the same size.\nW: Can I try them on?\nM: Sure." },
          { num: 14, type: "table", q: "대화를 듣고, 휴대폰 매장의 위치로 가장 알맞은 곳을 고르시오.", tableTitle: "Store Store\nIce\nCream\nStore", tableData: [{ label: "①", key: "Toy", value: "" }, { label: "②", key: "Bakery", value: "" }, { label: "③", key: "Book", value: "" }, { label: "④", key: "Jewelry Clothes", value: "" }, { label: "⑤", key: "Bank", value: "" }], options: ["①", "②", "③", "④", "⑤"], answer: 3, script: "M: I’m looking for the cellphone store. Do you know where it is?\nW: Sure. Can you see the ice cream store over there?\nM: Yes.\nW: Go straight to the ice cream store and turn right.\nM: Go straight and turn right?\nW: Yes. It’s on your left. It’s between the bakery and the book store.\nM: Thank you." },
          { num: 15, type: "text", q: "대화를 듣고, 남자가 여자에게 부탁한 일로 가장 적절한 것을 고르시오.", options: ["사진 찍어주기", "선크림 가져오기", "카메라 빌려주기", "유니폼 주문하기", "음료수 가져오기"], answer: 2, script: "[Cellphonerings.]\nW: Hey, James.\nM: Hi, Do-young. Today is the School’s Sports Day.\nW: Yes, I got my sports uniform and a camera.\nM: I’ll bring a few bottles of water. But I don’t have sun cream.\nW: Sun cream? I have one.\nM: Would you bring it for me? It’s really sunny outside.\nW: Sure, I’ll bring it to school." },
          { num: 16, type: "text", q: "대화를 듣고, 여자가 남자에게 제안한 것으로 가장 적절한 것을 고르시오.", options: ["프로그램 홍보하기", "댄스 수업 신청하기", "탁구 경기 관람하기", "수영 강습 등록하기", "태권도 경기 참가하기"], answer: 2, script: "W: The community center is starting new classes. Are you interested?\nM: What kind of classes do they have?\nW: There are swimming, table tennis, taekwondo, and dance classes.\nM: Dance class sounds cool. I really want to learn.\nW: Let’s sign up for the dance class. It’ll be fun.\nM: That’s a great idea." },
          { num: 17, type: "text", q: "대화를 듣고, 여자가 오늘 오후에 한 일로 가장 적절한 것을 고르시오.", options: ["꽃다발 사기", "파티 참석하기", "음식 주문하기", "케이크 만들기", "식당 예약하기"], answer: 3, script: "[Cellphonerings.]\nM: Hey, Seong-eun.\nW: Hello, Uncle Tim. Grandma’s birthday party is this Saturday. Are you coming?\nM: Of course. Do you want me to bring some food?\nW: You don’t need to. I ordered all the food this afternoon.\nM: Already? What did you order?\nW: I ordered her favorite Korean dishes.\nM: Great! Then, I’ll bring some flowers." },
          { num: 18, type: "text", q: "대화를 듣고, 남자의 직업으로 가장 적절한 것을 고르시오.", options: ["기상 캐스터", "환경미화원", "과학 교사", "영화배우", "농부"], answer: 2, script: "W: How was your day, honey?\nM: I’m a bit tired.\nW: Was there a lot of trash on the streets?\nM: No, but there were lots of leaves because it’s fall. It was hard to clean them up.\nW: I’m proud of you. Thanks to you, our streets are always clean.\nM: Thanks. I like my job, too." },
          { num: 19, type: "dialogue", q: "W: I’m looking for a new hobby. Any ideas?", options: ["Be careful.", "I’ll tell her.", "That would be great.", "This forest is beautiful.", "You should eat healthy."], answer: 3, script: "M: What about gardening? You can grow plants at home.\nW: Well, what kind of plants can I grow?\nM: You can grow vegetables like tomatoes or cucumbers.\nW: That might be interesting. I’ll think about it.\nM: You can ask me if you need any help.\nW: _____________________________" },
          { num: 20, type: "dialogue", q: "W: Did you hear about the school festival next month? There will be a lot of", options: ["No problem.", "That’s okay.", "I’ll make pasta.", "I don’t like cooking.", "There is the restaurant."], answer: 3, script: "M: Yes, I did. Are you interested in anything?\nW: I’m thinking of joining the cooking contest. I love cooking.\nM: That’s a good idea. You’re a great cook.\nW: Thanks!\nM: What will you cook?\nW: _____________________________\nANN:" }
        ]
      },
      {
        id: "2024_m1_r2",
        title: "2024학년도 제2회",
        subtitle: "중1 영어듣기능력평가",
        date: "2024. 9. 3.",
        audioFile: "https://dfpmpbjhljsyypofpvfu.supabase.co/storage/v1/object/public/listening-audio/2024_m1_r2.m4a",
        youtubeUrl: "",
        questions: [
          { num: 1, type: "image", q: "다음을 듣고, ‘this’가 가리키는 것으로 가장 적절한 것을 고르시오.", options: ["images/2024_m1_r2/q1_1.jpg", "images/2024_m1_r2/q1_2.jpg", "images/2024_m1_r2/q1_3.jpg", "images/2024_m1_r2/q1_4.jpg", "images/2024_m1_r2/q1_5.jpg"], answer: 5, script: "M: This is usually long and made of plastic. On one side, numbers are written in order. We use this to know how long or short something is. What is this?" },
          { num: 2, type: "image", q: "대화를 듣고, 두 사람이 주문할 캠핑 의자로 가장 적절한 것을 고르시오.", options: ["images/2024_m1_r2/q2_1.jpg", "images/2024_m1_r2/q2_2.jpg", "images/2024_m1_r2/q2_3.jpg", "images/2024_m1_r2/q2_4.jpg", "images/2024_m1_r2/q2_5.jpg"], answer: 4, script: "W: Honey, we need to buy a camping chair.\nM: I think so, too. Let’s search online.\nW: [Typingsound] Look at this chair. It has a lot of heart shapes on it.\nM: Hmm... I want something simple.\nW: Then, how about this one with a big four-leaf clover?\nM: Oh, that one’s pretty. I like it.\nW: Great. I will order it right away." },
          { num: 3, type: "image", q: "다음을 듣고, 현재 울산의 날씨로 가장 적절한 것을 고르시오.", options: ["images/2024_m1_r2/q3_1.jpg", "images/2024_m1_r2/q3_2.jpg", "images/2024_m1_r2/q3_3.jpg", "images/2024_m1_r2/q3_4.jpg", "images/2024_m1_r2/q3_5.jpg"], answer: 3, script: "M: Good afternoon. This is the national weather report. In Daejeon, it’s raining heavily now. It’s not raining in Daegu, but very windy. Ulsan is very cloudy right now, but the clouds will disappear later tonight." },
          { num: 4, type: "text", q: "대화를 듣고, 여자가 한 마지막 말의 의도로 가장 적절한 것을 고르시오.", options: ["감사", "충고", "칭찬", "거절", "축하"], answer: 2, script: "M: Oh, no! Mom, help!\nW: What’s the matter?\nM: I can’t find my wallet. It’s gone!\nW: Don’t panic, sweetie. Did you check your backpack?\nM: I looked inside the backpack, but it’s not there.\nW: Then how about your school uniform?\nM: My school uniform? [Rustlingsound] Oh, I found it!\nW: See? Next time, you should look carefully." },
          { num: 5, type: "text", q: "다음을 듣고, 남자가 급식실에 대해 언급하지 않은 것을 고르시오.", options: ["이름", "위치", "크기", "수용 인원", "이용 시간"], answer: 5, script: "M: Hello, students. Let me tell you about the new cafeteria. The school cafeteria is named Soora. This means king’s meal. It is on the second floor of the main building. It is as large as the school gym. About 500 people can use it at the same time." },
          { num: 6, type: "text", q: "대화를 듣고, 두 사람이 이야기를 나누는 현재 시각을 고르시오.", options: ["5:00p.m.", "5:30p.m.", "6:00p.m.", "6:30p.m.", "7:00p.m."], answer: 3, script: "[Cellphonerings.]\nW: Lewis, are you on your way here?\nM: Yeah. I left the office at 5:30 p.m.\nW: It’s 6 p.m. How long will it take to get here?\nM: Well, the traffic is heavy. I think it’ll take one more hour.\nW: Then, you mean you can get here by 7? It’s 6 p.m. now.\nM: That’s right." },
          { num: 7, type: "text", q: "대화를 듣고, 여자의 장래 희망으로 가장 적절한 것을 고르시오.", options: ["역사 교사", "환경 운동가", "건축 설계사", "관광 가이드", "패션 디자이너"], answer: 4, script: "M: Hey, what are you doing?\nW: I’m reading about Gyeongju’s famous buildings and their history.\nM: Is it your homework?\nW: No. My family is taking a trip to Gyeongju this winter. I want to be their guide.\nM: That’s nice. Are you interested in guiding travelers?\nW: Yeah. I want to be a tour guide in the future." },
          { num: 8, type: "text", q: "대화를 듣고, 여자의 심정으로 가장 적절한 것을 고르시오.", options: ["worried", "excited", "proud", "bored", "calm"], answer: 1, script: "M: Hey, Miji. Do you want to go skating with me?\nW: Skating? But I don’t know how.\nM: It’s okay. I’ll teach you!\nW: Hmm... but I think I’ll fall down. I don’t want to get hurt.\nM: Don’t worry. If you wear knee pads and a helmet, you’ll be okay.\nW: Well, I’m still afraid." },
          { num: 9, type: "text", q: "대화를 듣고, 여자가 대화 직후에 할 일로 가장 적절한 것을 고르시오.", options: ["병원 방문하기", "택시 호출하기", "부모님께 전화하기", "구급상자 가져오기", "보건 선생님 모셔오기"], answer: 5, script: "M: Ouch! My ankle!\nW: Are you okay? The floor is so slippery.\nM: My ankle hurts a lot.\nW: Oh, no. Can you walk to the nurse’s office?\nM: No, I don’t think I can walk now.\nW: Hold on. I’ll go and get the school nurse right away.\nM: Thank you. I’ll wait here." },
          { num: 10, type: "text", q: "대화를 듣고, 무엇에 관한 내용인지 가장 적절한 것을 고르시오.", options: ["인터넷 연결", "교통카드 충전", "전자 칠판 수리", "도서 대출기 사용", "공기청정기 필터 교환"], answer: 4, script: "M: Excuse me? I want to borrow this book, but the librarian isn’t here.\nW: You can use this machine.\nM: It is new to me. How do I use it?\nW: First, scan your library card here.\nM: Like this? [Beepsound]\nW: Perfect. Now, put the book on the scanner and press “OK.”\nM: [Beepsound] Got it." },
          { num: 11, type: "text", q: "대화를 듣고, 남자가 이동할 방법으로 가장 적절한 것을 고르시오.", options: ["버스", "택시", "도보", "지하철", "자전거"], answer: 2, script: "M: Mom, it’s snowing a lot. I can’t ride my bicycle to school today. Can you give me a ride?\nW: I’m sorry, but I have to take your grandma to the hospital.\nM: What should I do? I don’t want to be late.\nW: How about taking a taxi?\nM: Well, okay. I’ll call a taxi with my phone." },
          { num: 12, type: "text", q: "대화를 듣고, 남자가 공원에 가는 이유로 가장 적절한 것을 고르시오.", options: ["운동을 하려고", "책을 읽으려고", "버스킹을 보려고", "그림을 그리려고", "개를 산책시키려고"], answer: 3, script: "W: Hi, Sean! Where are you going?\nM: Hi! I’m going to Central Park.\nW: Are you going there to exercise?\nM: Not exactly. Today, there’s busking, and I’m going to see it.\nW: Oh, that sounds interesting! Can I go with you?\nM: Why not?" },
          { num: 13, type: "text", q: "대화를 듣고, 두 사람이 대화하는 장소로 가장 적절한 곳을 고르시오.", options: ["식당", "동물원", "수영장", "스키장", "박물관"], answer: 3, script: "W: Hello, Mr. Kim.\nM: Hello, Ms. Lee. Did you warm up?\nW: Yes, I did. What are we going to learn today?\nM: I’m going to give you a diving lesson. Let’s go to the deep water pool.\nW: That sounds fun!\nM: You’ll enjoy swimming more after you learn diving." },
          { num: 14, type: "text", q: "대화를 듣고, 남자가 찾는 필통의 위치로 가장 알맞은 곳을 고르시오.", options: ["①", "②", "③", "④", "⑤"], answer: 2, script: "M: Mom, I can’t find my pencil case.\nW: Maybe it’s in your room. I think it’s under the desk.\nM: I already checked, but it’s not there.\nW: How about on your bed?\nM: I can’t find it on my bed.\nW: Try checking on the piano.\nM: Ah, here it is! It was on top of the piano. Thanks!\nW: No problem!" },
          { num: 15, type: "text", q: "대화를 듣고, 여자가 남자에게 부탁한 일로 가장 적절한 것을 고르시오.", options: ["인사말 쓰기", "출석 확인하기", "학교 신문 편집하기", "신문 표지 사진 찍기", "사과 메시지 전달하기"], answer: 1, script: "[Knockknock]\nM: Come in.\nW: Hello, Mr. Choi.\nM: Hello, Min-sun. What brings you here?\nW: I have a favor to ask. It’s for the first school newspaper.\nM: That’s lovely. How can I help you?\nW: Can you write a greeting message?\nM: Sure. I’d be happy to do that.\nW: Thank you. It will be on the cover of our newspaper." },
          { num: 16, type: "text", q: "대화를 듣고, 남자가 여자에게 제안한 것으로 가장 적절한 것을 고르시오.", options: ["조깅하기", "장화 신기", "옷 세탁하기", "우산 챙기기", "운동화 사기"], answer: 2, script: "M: Scarlet, are you going out?\nW: Yes, Dad. I’m wearing new sneakers. How do I look?\nM: They look good on you. But it’s raining right now. They might get wet.\nW: Oh, I didn’t know it’s raining.\nM: How about wearing your rain boots?\nW: That’s a good idea." },
          { num: 17, type: "text", q: "대화를 듣고, 두 사람이 주말에 할 일로 가장 적절한 것을 고르시오.", options: ["영화 관람하기", "과학 축제 가기", "프린터 주문하기", "문구류 구입하기", "친구 집 방문하기"], answer: 2, script: "W: Hi, Mark. I like your cup.\nM: Thanks, Yeri. I made it at the science festival. They have a 3-D printer.\nW: A 3-D printer? That sounds fantastic!\nM: You can make things like cups, toys, and vases.\nW: Wow, I want to go and make something.\nM: I will go to the festival again this weekend. Would you join me?\nW: Of course." },
          { num: 18, type: "text", q: "대화를 듣고, 남자의 직업으로 가장 적절한 것을 고르시오.", options: ["사진작가", "수필가", "항해사", "화가", "광부"], answer: 4, script: "W: Danny, I heard you’ll go on a trip.\nM: Right. I’ll go to Gangwon State.\nW: Why? Are you going on a family trip?\nM: No, I’m going alone. I need to sketch mountains.\nW: Oh, is it for your new painting?\nM: That’s right. The theme of my new work is nature.\nW: I can’t wait to see your new painting." },
          { num: 19, type: "dialogue", q: "W: Hi, Minho. How was your weekend?", options: ["Sure, I’d love to.", "No, I’m not sick.", "Yes, it’ll be raining.", "No, I don’t like apples.", "Well, I’m not good at farming."], answer: 1, script: "M: Very nice. I went to the apple farm.\nW: Sounds interesting. Did you pick a lot of apples?\nM: Yes, and they were so delicious. How about you?\nW: I took a candle making class.\nM: That’s cool.\nW: Do you want to see my candle?\nM: ________________________________________________" },
          { num: 20, type: "dialogue", q: "M: Mom, I have to do Korean homework with my friends.", options: ["3 of my friends will come.", "We’ll start around 8 o’clock.", "Sorry, I’m busy on Saturday.", "I need to write 2 English essays.", "We’ll do our homework at the library."], answer: 1, script: "W: Oh, is it group work?\nM: Yes. Can I invite my friends over?\nW: Of course, you can. When will they come?\nM: They’re coming this Friday after school.\nW: I see. I’ll prepare some snacks. How many of them will come?\nM: ________________________________________________\nANN:" }
        ]
      },
      {
        id: "2025_m1_r2",
        title: "2025학년도 제2회",
        subtitle: "중1 영어듣기능력평가",
        date: "2025. 9.",
        audioFile: "https://dfpmpbjhljsyypofpvfu.supabase.co/storage/v1/object/public/listening-audio/2025_m1_r2.m4a",
        youtubeUrl: "",
        questions: [
          { num: 1, type: "image", q: "다음을 듣고, ‘this’가 가리키는 것으로 가장 적절한 것을 고르시오.", options: ["images/2025_m1_r2/q1_1.jpg", "images/2025_m1_r2/q1_2.jpg", "images/2025_m1_r2/q1_3.jpg", "images/2025_m1_r2/q1_4.jpg", "images/2025_m1_r2/q1_5.jpg"], answer: 4, script: "W: People use this every day. This often has four legs and a back. Usually, this is made of wood or plastic. This is something you sit on. This is often used with a table or a desk. What is this?" },
          { num: 2, type: "image", q: "대화를 듣고, 남자가 구입할 접시로 가장 적절한 것을 고르시오.", options: ["images/2025_m1_r2/q2_1.jpg", "images/2025_m1_r2/q2_2.jpg", "images/2025_m1_r2/q2_3.jpg", "images/2025_m1_r2/q2_4.jpg", "images/2025_m1_r2/q2_5.jpg"], answer: 5, script: "W: Hello. How can I help you?\nM: Hi. I’m looking for a dish.\nW: How about this one? This strawberry patterned dish is popular.\nM: The pattern is pretty, but I don’t want a square dish.\nW: We have a round one with the same pattern.\nM: Good. I’ll take the round one with the strawberry pattern." },
          { num: 3, type: "image", q: "다음을 듣고, 오늘 오후의 날씨로 가장 적절한 것을 고르시오.", options: ["images/2025_m1_r2/q3_1.jpg", "images/2025_m1_r2/q3_2.jpg", "images/2025_m1_r2/q3_3.jpg", "images/2025_m1_r2/q3_4.jpg", "images/2025_m1_r2/q3_5.jpg"], answer: 1, script: "M: Here’s the weather report. It was sunny and warm yesterday, but it started raining early this morning. The rain will stop before noon. In the afternoon, it’ll be sunny again. The sun will come out, so be prepared for a hot day." },
          { num: 4, type: "text", q: "대화를 듣고, 남자가 한 마지막 말의 의도로 가장 적절한 것을 고르시오.", options: ["승낙", "거절", "요청", "위로", "항의"], answer: 3, script: "W: Roy, you don’t look well. Are you okay?\nM: Well, my back hurts.\nW: Oh, no. That sounds terrible. I also hurt my back before.\nM: Really? Did it get better?\nW: Yes, I’m fine now. I know a very good doctor. She helped me a lot.\nM: Then, can you give me her phone number?" },
          { num: 5, type: "text", q: "다음을 듣고, 여자가 사하 공원에 대해 언급하지 않은 것을 고르시오.", options: ["위치", "개장 연도", "디자이너", "내부 시설", "개방 시간"], answer: 4, script: "W: Let me tell you about Sahah Park. It’s between City Hall and Sahah Bus\nTerminal. It’s popular among tourists. It opened in 2015. It was designed by a famous park designer, Noah Philip. It’s open every day from 9a.m. to 10p.m." },
          { num: 6, type: "text", q: "대화를 듣고, 회의가 시작되는 시각을 고르시오.", options: ["9:15a.m.", "9:30a.m.", "9:45a.m.", "10:00a.m.", "10:15a.m."], answer: 4, script: "W: Robert, did you copy the reports? It’s already 9:30a.m.\nM: Sorry, Anna. The copy machine still isn’t working.\nW: Really? When will it be fixed?\nM: I heard that it’ll take about 15 more minutes.\nW: Okay. The meeting starts at 10a.m. We still have some time.\nM: That’s right. I’ll copy them before the meeting." },
          { num: 7, type: "text", q: "대화를 듣고, 남자의 장래 희망으로 가장 적절한 것을 고르시오.", options: ["탐험가", "역사학자", "프로그래머", "곤충 사육사", "장난감 제작자"], answer: 2, script: "W: Wow. You have many history books.\nM: Yes, I love reading about history.\nW: Really? Why do you like history?\nM: I like to learn about past events. They’re so interesting.\nW: That’s why you want to become a historian.\nM: That’s right. I’ll study history all over the world someday." },
          { num: 8, type: "text", q: "대화를 듣고, 여자의 심정으로 가장 적절한 것을 고르시오.", options: ["부러움", "지루함", "뿌듯함", "두려움", "아쉬움"], answer: 3, script: "W: Dad, look! I’m drawing a cat.\nM: That’s good. But Sweetie, can you make the eyes bigger?\nW: Okay. [Drawingsound] Like this?\nM: Yes. And draw triangles for its ears, not circles.\nW: [Drawingsound] Wow! Now it looks more like a cat. I did it!\nM: Good job!\nW: Now I can draw a cat myself!" },
          { num: 9, type: "text", q: "대화를 듣고, 여자가 대화 직후에 할 일로 가장 적절한 것을 고르시오.", options: ["병문안 가기", "수강 신청하기", "경제 공부하기", "체육복 구입하기", "드라마 시청하기"], answer: 5, script: "W: Mike, learning Korean isn’t easy.\nM: How do you study?\nW: I use my textbook, but it’s a bit boring.\nM: Why don’t you try watching Korean dramas?\nW: Dramas? Do you know any good ones?\nM: How about Kim’sFamily? They use easy Korean.\nW: Oh, thanks. I’ll go watch it now!" },
          { num: 10, type: "text", q: "대화를 듣고, 무엇에 관한 내용인지 가장 적절한 것을 고르시오.", options: ["스마트폰 수리", "로봇 조립 과정", "종이비행기 접기", "보고서 제출 장소", "가습기 사용 시간"], answer: 1, script: "[Telephonerings.]\nM: Good afternoon. How may I help you?\nW: Hi. My smartphone speaker is broken. I need to fix it.\nM: Then, you’ll have to bring your phone to our center.\nW: How long will it take to fix my phone?\nM: We’ll have to check it first, but it usually takes an hour.\nW: Okay. I’ll visit there soon." },
          { num: 11, type: "text", q: "대화를 듣고, 두 사람이 함께 이동할 방법으로 가장 적절한 것을 고르시오.", options: ["도보", "버스", "택시", "지하철", "자전거"], answer: 2, script: "M: Somin, how can we get to the concert hall?\nW: It’s not too far away from here. Why don’t we just walk?\nM: It’s so hot. I don’t want to walk.\nW: Then, how about taking a bus or subway?\nM: Sounds like a good idea! Let’s take the bus.\nW: Great. Let’s go." },
          { num: 12, type: "text", q: "대화를 듣고, 남자가 서두르는 이유로 가장 적절한 것을 고르시오.", options: ["기차 시간이 촉박해서", "밀린 숙제를 해야 해서", "농구 경기를 봐야 해서", "할머니와 외출을 해야 해서", "아빠의 생신 케이크를 사야 해서"], answer: 5, script: "W: Josh, we finally finished our group homework!\nM: Yeah, it’s done. Now, can I leave?\nW: Why are you in a hurry?\nM: I have to buy a birthday cake for my dad.\nW: Oh, I hope you find a good birthday cake.\nM: Thanks. See you in class tomorrow!" },
          { num: 13, type: "text", q: "대화를 듣고, 두 사람이 대화하는 장소로 가장 적절한 곳을 고르시오.", options: ["수족관", "미용실", "목공예 스튜디오", "버스 정류장", "아이스 링크"], answer: 3, script: "W: Hello, Mr. Wayne.\nM: Hi. Welcome to the course. Are you ready to make a wood pencil case?\nW: Yes, but I’m a little worried. I never made anything out of wood before.\nM: It’s okay. This is a beginner course. Let’s start with cutting some wood.\nW: Okay. Let me get my tools first." },
          { num: 14, type: "table", q: "SG Future Star Audition에 관한 다음 내용을 듣고, 표에서 일치하지 않는", tableTitle: "SG Future Star Audition", tableData: [{ label: "①", key: "대상 연령", value: "older than 10" }, { label: "②", key: "날짜", value: "September 6th" }, { label: "③", key: "분야", value: "singing or dancing" }, { label: "④", key: "제한 시간", value: "3 minutes" }, { label: "⑤", key: "장소", value: "SG Star Training Center" }], options: ["①", "②", "③", "④", "⑤"], answer: 4, script: "M: Do you want to be a star? Come to SG Future Star Audition if you’re older than 10. It’s on September 6th. We’re looking for people good at singing or dancing. But you’ll get only 5 minutes. It’ll be at the SG Star\nTraining Center." },
